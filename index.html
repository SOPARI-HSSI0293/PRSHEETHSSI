<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Report - PT. HSSI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); }
        /* Style Input ala Excel Gambar 2 */
        .excel-input-box { border: 1px solid #000; background: #fff; display: flex; align-items: center; padding: 2px 8px; height: 32px; }
        .excel-label { font-size: 10px; font-bold; color: #000; margin-right: 8px; white-space: nowrap; }
        .excel-field { border: none; font-size: 12px; font-weight: bold; width: 100%; outline: none; text-transform: uppercase; }
        .member-grid-box { border: 1px solid #000; background: #fff; padding: 4px; display: flex; flex-direction: column; align-items: center; }
        .member-field { width: 100%; border: none; text-align: center; font-size: 11px; font-weight: bold; outline: none; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzh-4ByxkDMIwzg7EFYp6X21UIFSaD2vePeKwv-koxNV2vS9GXkjmo_Y_RlVL2I0dF4/exec";

        // --- IKON SVG ---
        const IconDashboard = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>;
        const IconReport = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>;
        const PlusIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const XIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;

        // =====================================================================
        // KOMPONEN 1: LOGIN PAGE
        // =====================================================================
        const LoginPage = ({ onLogin }) => {
            const [creds, setCreds] = useState({ username: '', password: '' });
            return (
                <div className="h-screen w-full flex items-center justify-center bg-[#1e3a8a]">
                    <div className="bg-white p-10 rounded-2xl shadow-2xl w-full max-w-md">
                        <h1 className="text-3xl font-black text-center text-blue-900 mb-2">HSSI <span className="text-blue-500">SYSTEM</span></h1>
                        <p className="text-center text-xs font-bold text-gray-400 uppercase tracking-widest mb-8 border-t pt-2">Sign In to Dashboard</p>
                        <div className="space-y-4">
                            <input type="text" placeholder="USERNAME" className="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500 font-bold" onChange={e => setCreds({...creds, username: e.target.value})} />
                            <input type="password" placeholder="PASSWORD" className="w-full border-2 p-3 rounded-xl outline-none focus:border-blue-500 font-bold" onChange={e => setCreds({...creds, password: e.target.value})} />
                            <button onClick={() => onLogin({name: creds.username.toUpperCase()})} className="w-full bg-blue-600 text-white p-4 rounded-xl font-bold shadow-lg hover:bg-blue-700">LOGIN</button>
                        </div>
                    </div>
                </div>
            );
        };

        // =====================================================================
        // KOMPONEN 2: PRODUCTION REPORT (Ref: Gambar 2)
        // =====================================================================
        const ProductionReportModule = () => {
            const [rows, setRows] = useState([]);
            const [header, setHeader] = useState({ tanggal: new Date().toISOString().split('T')[0], line: 'LV1', leader: '', ot: '' });
            const [members, setMembers] = useState(Array(10).fill(''));
            const [showScanner, setShowScanner] = useState(false);
            const [showFormModal, setShowFormModal] = useState(false);
            const [currentEntry, setCurrentEntry] = useState(null);

            const handleSave = async () => {
                const payload = { action: 'save', header, members: members.filter(m => m.trim() !== ""), rows: [{...currentEntry, no: rows.length + 1}] };
                setRows([...rows, {...currentEntry, no: rows.length + 1}]);
                setShowFormModal(false);
                // POST logic to WEB_APP_URL would go here
            };

            return (
                <div className="bg-white rounded-lg shadow border border-gray-300 flex flex-col h-full relative">
                    {/* Header Biru - Gambar 2 */}
                    <div className="bg-[#1e40af] text-white p-4 rounded-t-lg border-b-4 border-blue-400">
                        <h2 className="text-2xl font-black italic tracking-tighter">HSSI - PRODUCTION REPORT <span className="text-xs font-normal not-italic opacity-70">v2.1</span></h2>
                        <p className="text-[10px] font-bold uppercase text-blue-200 mt-1">Sistem Pencatatan Laporan Produksi Digital</p>
                    </div>

                    {/* Toolbar Panel - Gambar 2 */}
                    <div className="bg-gray-100 p-4 border-b space-y-4">
                        <div className="flex flex-wrap gap-3">
                            <div className="excel-input-box w-44"><span className="excel-label">TANGGAL</span><input type="date" className="excel-field" value={header.tanggal} onChange={e => setHeader({...header, tanggal: e.target.value})} /></div>
                            <div className="excel-input-box w-32"><span className="excel-label">LINE</span><select className="excel-field" value={header.line} onChange={e => setHeader({...header, line: e.target.value})}><option>LV1</option><option>LM1</option><option>SL1</option></select></div>
                            <div className="excel-input-box w-48"><span className="excel-label">LEADER</span><input type="text" className="excel-field" placeholder="..." value={header.leader} onChange={e => setHeader({...header, leader: e.target.value})} /></div>
                            <div className="excel-input-box w-20"><span className="excel-label">OT</span><input type="text" className="excel-field text-center" placeholder="0" value={header.ot} onChange={e => setHeader({...header, ot: e.target.value})} /></div>
                        </div>

                        {/* Line Members Grid */}
                        <div className="grid grid-cols-5 md:grid-cols-10 gap-1">
                            {members.map((m, i) => (
                                <div key={i} className="member-grid-box">
                                    <span className="text-[8px] font-bold text-gray-400 mb-1">M{i+1}</span>
                                    <input className="member-field" placeholder="..." value={m} onChange={e => {const nm = [...members]; nm[i] = e.target.value; setMembers(nm);}} />
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Tabel */}
                    <div className="flex-1 overflow-auto p-2">
                        <table className="w-full border-collapse text-[11px]">
                            <thead className="sticky top-0 bg-[#334155] text-white font-bold text-center">
                                <tr>
                                    <th className="border border-gray-500 p-2 w-10">NO</th>
                                    <th className="border border-gray-500 p-2 w-32">CCNO</th>
                                    <th className="border border-gray-500 p-2">SPEC</th>
                                    <th className="border border-gray-500 p-2 w-20">WEIGHT</th>
                                    <th className="border border-gray-500 p-2 w-16">FG</th>
                                    <th className="border border-gray-500 p-2 w-16">NG</th>
                                    <th className="border border-gray-500 p-2 w-16">START</th>
                                    <th className="border border-gray-500 p-2 w-16">END</th>
                                    <th className="border border-gray-500 p-2">REMARK</th>
                                </tr>
                            </thead>
                            <tbody>
                                {rows.length === 0 ? <tr><td colSpan="9" className="p-10 text-center text-gray-400 italic">Belum ada data scan</td></tr> : 
                                rows.map((r, i) => (
                                    <tr key={i} className="text-center hover:bg-blue-50 border-b border-gray-300">
                                        <td className="border-x p-2 font-bold bg-gray-50">{r.no}</td>
                                        <td className="border-r p-2 font-bold text-blue-700">{r.ccno}</td>
                                        <td className="border-r p-2 text-left">{r.spec}</td>
                                        <td className="border-r p-2">{r.weight}</td>
                                        <td className="border-r p-2 font-bold">{r.qty_fg}</td>
                                        <td className="border-r p-2 text-red-600 font-bold">{r.qty_ng}</td>
                                        <td className="border-r p-2 text-green-700">{r.start_proc}</td>
                                        <td className="border-r p-2 text-red-700">{r.end_proc}</td>
                                        <td className="border-r p-2 text-left italic">{r.remark}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {/* FAB SCAN QR */}
                    <button onClick={() => setShowFormModal(true)} className="absolute bottom-6 right-6 bg-blue-600 text-white p-4 rounded-full shadow-2xl hover:scale-105 transition-all flex items-center gap-2 group">
                        <PlusIcon /> <span className="hidden group-hover:inline font-bold pr-2 text-sm">SCAN QR</span>
                    </button>

                    {/* Modal Input (Simplified for this demo) */}
                    {showFormModal && (
                        <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-md p-6">
                                <h2 className="text-lg font-bold mb-4 border-b pb-2 uppercase">Input Data Produksi</h2>
                                <div className="space-y-3">
                                    <input type="text" placeholder="CCNO" className="w-full border p-2 rounded uppercase font-bold" onChange={e => setCurrentEntry({...currentEntry, ccno: e.target.value})} />
                                    <div className="grid grid-cols-2 gap-2">
                                        <input type="number" placeholder="QTY FG" className="w-full border p-2 rounded" onChange={e => setCurrentEntry({...currentEntry, qty_fg: e.target.value})} />
                                        <input type="number" placeholder="QTY NG" className="w-full border p-2 rounded text-red-600" onChange={e => setCurrentEntry({...currentEntry, qty_ng: e.target.value})} />
                                    </div>
                                    <button onClick={handleSave} className="w-full bg-green-600 text-white p-3 rounded font-bold mt-4">SIMPAN</button>
                                    <button onClick={() => setShowFormModal(false)} className="w-full text-gray-500 font-bold mt-2">BATAL</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // =====================================================================
        // KOMPONEN 3: MAIN APP (Sidebar Fixed)
        // =====================================================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [activeMenu, setActiveMenu] = useState('menu1');

            if (!user) return <LoginPage onLogin={setUser} />;

            return (
                <div className="flex h-screen bg-[#f4f6f9] overflow-hidden">
                    {/* SIDEBAR FIXED (No Minimize) */}
                    <div className="w-64 bg-[#2c323a] text-[#aab3bc] flex flex-shrink-0 flex-col z-20 shadow-xl">
                        <div className="h-[60px] bg-[#22272e] flex items-center justify-center border-b border-[#1e2228]">
                            <span className="font-bold text-xl tracking-wider text-white">HSSI <span className="text-blue-500">SYSTEM</span></span>
                        </div>
                        <div className="p-4 border-b border-[#3b424d] flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-red-600 text-white flex items-center justify-center font-bold">{user.name[0]}</div>
                            <div className="flex flex-col">
                                <span className="text-white font-bold text-sm">{user.name}</span>
                                <span className="text-[10px] text-green-500 font-bold uppercase tracking-widest">● Online</span>
                            </div>
                        </div>
                        <div className="px-5 py-4 text-[10px] font-bold text-[#647180] uppercase tracking-widest">Navigation</div>
                        <nav className="flex-1 px-2 space-y-1">
                            <button onClick={() => setActiveMenu('menu2')} className={`w-full flex items-center gap-3 p-3 rounded-lg transition-all ${activeMenu === 'menu2' ? 'bg-[#252a31] text-white border-l-4 border-blue-500' : 'hover:bg-[#252a31]'}`}>
                                <IconDashboard /> <span className="text-sm font-medium">Dashboard</span>
                            </button>
                            <button onClick={() => setActiveMenu('menu1')} className={`w-full flex items-center gap-3 p-3 rounded-lg transition-all ${activeMenu === 'menu1' ? 'bg-[#252a31] text-white border-l-4 border-blue-500' : 'hover:bg-[#252a31]'}`}>
                                <IconReport /> <span className="text-sm font-medium">Production Report</span>
                            </button>
                        </nav>
                        <button onClick={() => setUser(null)} className="p-4 bg-red-950 text-white text-[10px] font-bold uppercase tracking-widest hover:bg-red-900 transition-colors">Sign Out</button>
                    </div>

                    {/* CONTENT AREA */}
                    <div className="flex-1 flex flex-col min-w-0 relative">
                        <header className="h-[60px] bg-[#a84444] shadow-md flex items-center px-6 z-10">
                            <h1 className="text-lg font-bold text-white uppercase tracking-wider">
                                {activeMenu === 'menu1' ? 'Production Report' : 'Dashboard Monitor'}
                            </h1>
                        </header>
                        <main className="flex-1 overflow-auto p-6">
                            {activeMenu === 'menu1' ? <ProductionReportModule /> : 
                            <div className="p-10 bg-white rounded-xl shadow-sm text-center"><h2 className="text-gray-400 font-black text-2xl">DASHBOARD COMING SOON</h2></div>}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
