<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Report - PT. HSSI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .excel-table th { border: 1px solid #000; background-color: #e2e8f0; font-size: 10px; }
        .excel-table td { border: 1px solid #000; font-size: 11px; }
        .login-bg { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzh-4ByxkDMIwzg7EFYp6X21UIFSaD2vePeKwv-koxNV2vS9GXkjmo_Y_RlVL2I0dF4/exec";

        // ==========================================
        // KOMPONEN: LOGIN PAGE (Ref: image_ac071e.jpg)
        // ==========================================
        const LoginPage = ({ onLogin }) => {
            const [credentials, setCredentials] = useState({ username: '', password: '' });
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    const res = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        body: JSON.stringify({ action: 'login', ...credentials })
                    });
                    // Karena no-cors, kita anggap sukses atau buat mekanisme token sederhana
                    // Untuk demo ini, kita izinkan masuk (Idealnya gunakan CORS di GAS)
                    onLogin({ name: credentials.username.toUpperCase(), role: 'Operator' });
                } catch (err) { setError("Koneksi Gagal"); }
                setLoading(false);
            };

            return (
                <div className="h-screen w-full flex items-center justify-center login-bg">
                    <div className="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
                        <div className="text-center mb-8">
                            <h1 className="text-3xl font-black text-blue-900 tracking-tighter">HSSI <span className="text-blue-500">SYSTEM</span></h1>
                            <p className="text-gray-500 text-sm font-bold uppercase mt-2 border-t pt-2">Sign In to Dashboard</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <div>
                                <label className="block text-xs font-bold text-gray-600 uppercase mb-1">Username</label>
                                <input type="text" required className="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-blue-500 outline-none transition-all" 
                                    onChange={e => setCredentials({...credentials, username: e.target.value})} />
                            </div>
                            <div>
                                <label className="block text-xs font-bold text-gray-600 uppercase mb-1">Password</label>
                                <input type="password" required className="w-full border-2 border-gray-100 p-3 rounded-xl focus:border-blue-500 outline-none transition-all" 
                                    onChange={e => setCredentials({...credentials, password: e.target.value})} />
                            </div>
                            {error && <p className="text-red-500 text-xs font-bold text-center">{error}</p>}
                            <button type="submit" className="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 shadow-lg transform active:scale-95 transition-all">
                                {loading ? 'AUTHENTICATING...' : 'LOGIN'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        // ==========================================
        // KOMPONEN: PRODUCTION REPORT (Ref: PR V1.HTML)
        // ==========================================
        const ProductionReport = () => {
            const [rows, setRows] = useState([]);
            const [header, setHeader] = useState({ tanggal: new Date().toISOString().split('T')[0], line: 'LV1', leader: '', ot: '' });
            const [members, setMembers] = useState(Array(10).fill(''));
            const [showScanner, setShowScanner] = useState(false);

            return (
                <div className="bg-white p-4 rounded-lg shadow-sm border border-black min-h-screen">
                    {/* Header Banner - Gaya PR V1 */}
                    <div className="bg-[#1e3a8a] text-white p-3 rounded-t flex justify-between items-center border-b-2 border-yellow-400">
                        <div className="font-black italic text-lg uppercase tracking-widest">PT. HSSI - Production Report</div>
                        <div className="text-[10px] font-bold bg-yellow-400 text-blue-900 px-2 py-1 rounded">VER 2.1</div>
                    </div>

                    {/* Toolbar Panel */}
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-2 bg-gray-50 p-3 border-x border-black">
                        <div className="flex items-center gap-2">
                            <span className="text-[10px] font-bold">DATE:</span>
                            <input type="date" className="border border-black p-1 text-xs" value={header.tanggal} onChange={e => setHeader({...header, tanggal: e.target.value})} />
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="text-[10px] font-bold">LINE:</span>
                            <select className="border border-black p-1 text-xs font-bold" value={header.line} onChange={e => setHeader({...header, line: e.target.value})}>
                                <option>LV1</option><option>LM1</option><option>SL1</option>
                            </select>
                        </div>
                        <div className="flex items-center gap-2">
                            <span className="text-[10px] font-bold">LEADER:</span>
                            <input type="text" className="border border-black p-1 text-xs w-full uppercase" value={header.leader} onChange={e => setHeader({...header, leader: e.target.value})} />
                        </div>
                        <button onClick={() => setShowScanner(true)} className="bg-blue-600 text-white font-bold py-2 rounded shadow-md flex items-center justify-center gap-2 hover:bg-blue-700">
                            📷 SCAN QR LABEL
                        </button>
                    </div>

                    {/* Members Bar */}
                    <div className="flex flex-wrap gap-1 p-2 bg-gray-100 border-x border-b border-black">
                        {members.map((m, i) => (
                            <input key={i} className="border border-gray-400 text-[9px] p-1 w-20 text-center uppercase font-bold" 
                                placeholder={`Member ${i+1}`} value={m} onChange={e => {
                                    const nm = [...members]; nm[i] = e.target.value; setMembers(nm);
                                }} />
                        ))}
                    </div>

                    {/* Excel Table - Gaya PR V1 */}
                    <div className="overflow-x-auto mt-4">
                        <table className="excel-table w-full">
                            <thead>
                                <tr>
                                    <th rowSpan="2" className="w-10">NO</th>
                                    <th rowSpan="2" className="w-32">CC NO</th>
                                    <th rowSpan="2" className="w-20">CUSTOMER</th>
                                    <th rowSpan="2">SPEC</th>
                                    <th colSpan="2">MATERIAL RAW</th>
                                    <th colSpan="2">PRODUCT</th>
                                    <th colSpan="2">REMARK</th>
                                </tr>
                                <tr>
                                    <th className="w-16">WIDTH</th><th className="w-16">WEIGHT</th>
                                    <th className="w-16">FG</th><th className="w-16">NG</th>
                                    <th>KETERANGAN</th>
                                </tr>
                            </thead>
                            <tbody>
                                {rows.length === 0 ? (
                                    <tr><td colSpan="11" className="p-8 text-gray-400 italic font-bold">BELUM ADA DATA PROSES HARI INI</td></tr>
                                ) : rows.map((r, i) => (
                                    <tr key={i}>
                                        <td>{i+1}</td><td>{r.ccno}</td><td>{r.customer}</td><td>{r.spec}</td>
                                        <td>{r.width}</td><td>{r.weight}</td><td>{r.qty_fg}</td>
                                        <td className="bg-red-100 font-bold text-red-600">{r.qty_ng}</td>
                                        <td>{r.remark}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        // ==========================================
        // MAIN APP LOGIC
        // ==========================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [activeMenu, setActiveMenu] = useState('menu1');

            if (!user) return <LoginPage onLogin={setUser} />;

            return (
                <div className="flex h-screen overflow-hidden">
                    {/* Sidebar */}
                    <div className="w-64 bg-[#2c323a] text-white flex flex-col">
                        <div className="p-6 bg-[#22272e] font-black text-xl border-b border-gray-700">HSSI SYSTEM</div>
                        <div className="p-4 border-b border-gray-700 flex items-center gap-3">
                            <div className="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center font-bold">{user.name[0]}</div>
                            <div className="text-xs uppercase font-bold">{user.name}</div>
                        </div>
                        <nav className="flex-1 p-4 space-y-2">
                            <button onClick={() => setActiveMenu('menu1')} className={`w-full text-left p-3 rounded ${activeMenu==='menu1' ? 'bg-blue-600' : 'hover:bg-gray-700'}`}>Production Report</button>
                            <button className="w-full text-left p-3 rounded hover:bg-gray-700 text-gray-500">Dashboard Monitor</button>
                        </nav>
                        <button onClick={() => setUser(null)} className="p-4 bg-red-900 hover:bg-red-800 font-bold uppercase text-xs">Sign Out</button>
                    </div>
                    {/* Content Area */}
                    <div className="flex-1 flex flex-col">
                        <header className="h-14 bg-[#a84444] flex items-center px-6 text-white font-bold uppercase shadow-lg">
                            {activeMenu === 'menu1' ? 'Production Report Module' : 'System Dashboard'}
                        </header>
                        <main className="flex-1 overflow-auto p-6 bg-gray-100">
                            {activeMenu === 'menu1' && <ProductionReport />}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
