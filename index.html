<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production System - PT. HSSI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        .login-gradient { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); }
        .excel-table th, .excel-table td { border: 1px solid #000; padding: 4px; text-align: center; font-size: 11px; }
        .tab-active { border-bottom: 4px solid #ef4444; color: #b91c1c; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzh-4ByxkDMIwzg7EFYp6X21UIFSaD2vePeKwv-koxNV2vS9GXkjmo_Y_RlVL2I0dF4/exec";

        // ==========================================
        // COMPONENT: LOGIN (Ref: image_a12583.jpg)
        // ==========================================
        const LoginPage = ({ onLogin }) => {
            const [form, setForm] = useState({ username: '', password: '' });
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoading(true);
                // Simulasi Fetch ke GAS action: login
                onLogin({ name: form.username.toUpperCase(), role: 'Operator' }); 
            };

            return (
                <div className="h-screen w-full flex items-center justify-center login-gradient">
                    <div className="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-md border border-white/20 backdrop-blur-sm">
                        <div className="text-center mb-8">
                            <div className="w-20 h-20 bg-blue-100 rounded-2xl mx-auto mb-4 flex items-center justify-center">
                                <svg className="w-12 h-12 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
                            </div>
                            <h1 className="text-2xl font-black text-blue-900 tracking-tighter">HSSI <span className="text-blue-500">PRODUCTION</span></h1>
                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">Personnel Authentication</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="text" placeholder="USERNAME" required className="w-full bg-gray-50 border-2 border-gray-100 p-4 rounded-2xl focus:border-blue-500 outline-none font-bold" onChange={e => setForm({...form, username: e.target.value})} />
                            <input type="password" placeholder="PASSWORD" required className="w-full bg-gray-50 border-2 border-gray-100 p-4 rounded-2xl focus:border-blue-500 outline-none font-bold" onChange={e => setForm({...form, password: e.target.value})} />
                            <button className="w-full bg-blue-600 text-white p-4 rounded-2xl font-black shadow-xl hover:bg-blue-700 transition-all active:scale-95">LOGIN SYSTEM</button>
                        </form>
                    </div>
                </div>
            );
        };

        // ==========================================
        // COMPONENT: MAIN MODULE
        // ==========================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [activeMenu, setActiveMenu] = useState('menu1');
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [showAddModal, setShowAddModal] = useState(false);
            const [activeTab, setActiveTab] = useState('header'); // header | proses | downtime

            // State Data Form
            const [formData, setFormData] = useState({
                // Header
                tanggal: new Date().toISOString().split('T')[0],
                leader: '', ot: '', members: '',
                // Proses
                ccno: '', customer: '', spec: '', rawSize: '', actualWidth: '', weightRaw: '', productSize: '', qtyFG: 0, qtyNG: 0,
                startProc: '', endProc: '', prodKeluar: '', lineSpeed: '', remark: '',
                // Downtime
                tbm: 0, packBack: 0, waitMC: 0, waitHagumi: 0, waitCrane: 0, hagumiSep: 0, winder: 0, cleaning: 0, machineProb: 0
            });

            if (!user) return <LoginPage onLogin={setUser} />;

            // LOGIKA SCANNER QR SESUAI INSTRUKSI
            const handleQRScan = async (text) => {
                const p = text.split(',');
                if(p.length < 6) return alert("QR Code Tidak Valid!");

                const ccNoClean = p[0].slice(0, -1); // Hilangkan karakter terakhir
                const specCode = p[1];
                const rawSize = p[2];
                const weightRaw = p[5];

                // Update state sementara
                setFormData(prev => ({
                    ...prev,
                    ccno: ccNoClean,
                    rawSize: rawSize,
                    weightRaw: weightRaw
                }));

                // Cari Spec di Master_Spec via GAS
                // Fetch logic... (Dianggap berhasil mengupdate spec)
                setActiveTab('proses'); // Pindah ke tab proses setelah scan
            };

            return (
                <div className="flex h-screen bg-[#f4f6f9] overflow-hidden">
                    {/* SIDEBAR */}
                    <div className={`bg-[#2c323a] text-[#aab3bc] transition-all duration-300 flex flex-col z-20 shadow-2xl ${isSidebarOpen ? 'w-64' : 'w-20'}`}>
                        <div className="h-[60px] bg-[#22272e] flex items-center justify-center border-b border-[#1e2228]">
                            <span className="font-black text-white text-xl uppercase">{isSidebarOpen ? 'HSSI SYSTEM' : 'HS'}</span>
                        </div>
                        <nav className="flex-1 p-2 space-y-1 mt-4">
                            <button onClick={() => setActiveMenu('menu1')} className={`w-full flex items-center p-3 rounded-xl transition-all ${activeMenu === 'menu1' ? 'bg-blue-600 text-white shadow-lg' : 'hover:bg-gray-700'}`}>
                                <span className="text-xl">📝</span> {isSidebarOpen && <span className="ml-3 font-bold text-xs">PRODUCTION REPORT</span>}
                            </button>
                            <button className="w-full flex items-center p-3 rounded-xl hover:bg-gray-700">
                                <span className="text-xl">📊</span> {isSidebarOpen && <span className="ml-3 font-bold text-xs text-gray-500">DASHBOARD</span>}
                            </button>
                        </nav>
                        <button onClick={() => setUser(null)} className="p-4 bg-red-950 text-white font-bold text-[10px] uppercase">Logout</button>
                    </div>

                    {/* CONTENT */}
                    <div className="flex-1 flex flex-col relative overflow-hidden">
                        <header className="h-[60px] bg-[#a84444] shadow-md flex items-center justify-between px-6">
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="text-white text-2xl">☰</button>
                            <h1 className="text-white font-black uppercase tracking-widest italic">Production Report Module</h1>
                        </header>

                        <main className="flex-1 p-6 overflow-auto">
                            <div className="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-xl font-black text-gray-800 uppercase tracking-tighter">Daily Production Logs</h2>
                                    <button onClick={() => setShowAddModal(true)} className="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg hover:bg-blue-700 transition-all">+ TAMBAH DATA</button>
                                </div>
                                <div className="overflow-auto">
                                    <table className="excel-table w-full">
                                        <thead>
                                            <tr className="bg-gray-100">
                                                <th>NO</th><th>CC NO</th><th>SPEC</th><th>SIZE</th><th>WEIGHT</th><th>QTY FG</th><th>QTY NG</th><th>REMARK</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr><td colSpan="8" className="p-10 text-gray-300 italic uppercase font-bold">No Data Entry in this Session</td></tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </main>
                    </div>

                    {/* MODAL MULTI-SUBFORM */}
                    {showAddModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-5xl max-h-[90vh] flex flex-col overflow-hidden border border-white/20">
                                {/* TAB NAVIGATION */}
                                <div className="flex bg-gray-50 border-b">
                                    <button onClick={() => setActiveTab('header')} className={`flex-1 p-4 text-xs font-black uppercase ${activeTab === 'header' ? 'tab-active bg-white' : ''}`}>1. Sub-Form Header</button>
                                    <button onClick={() => setActiveTab('proses')} className={`flex-1 p-4 text-xs font-black uppercase ${activeTab === 'proses' ? 'tab-active bg-white' : ''}`}>2. Sub-Form Proses</button>
                                    <button onClick={() => setActiveTab('downtime')} className={`flex-1 p-4 text-xs font-black uppercase ${activeTab === 'downtime' ? 'tab-active bg-white' : ''}`}>3. Sub-Form Downtime</button>
                                </div>

                                <div className="flex-1 overflow-y-auto p-8 bg-white">
                                    {/* FORM 1: HEADER */}
                                    {activeTab === 'header' && (
                                        <div className="grid grid-cols-2 gap-6">
                                            <div><label className="text-[10px] font-black text-gray-400">TANGGAL</label><input type="date" className="w-full border-2 p-3 rounded-xl font-bold" value={formData.tanggal} /></div>
                                            <div><label className="text-[10px] font-black text-gray-400">LINE (AUTO)</label><input type="text" className="w-full border-2 p-3 rounded-xl font-bold bg-gray-50" value={user.name} readOnly /></div>
                                            <div><label className="text-[10px] font-black text-gray-400">LEADER</label><input type="text" className="w-full border-2 p-3 rounded-xl font-bold" /></div>
                                            <div><label className="text-[10px] font-black text-gray-400">OT (OVERTIME)</label><input type="text" className="w-full border-2 p-3 rounded-xl font-bold" /></div>
                                            <div className="col-span-2"><label className="text-[10px] font-black text-gray-400">LINE MEMBERS (PISAHKAN KOMA)</label><textarea className="w-full border-2 p-3 rounded-xl font-bold" placeholder="Member 1, Member 2..."></textarea></div>
                                        </div>
                                    )}

                                    {/* FORM 2: PROSES */}
                                    {activeTab === 'proses' && (
                                        <div className="space-y-6">
                                            <div className="flex justify-center p-4 bg-blue-50 rounded-2xl border-2 border-dashed border-blue-200">
                                                <button onClick={() => handleQRScan("250807007-000000I,0378,2.500 X 1000.0 X COIL,56H00498,1,4710,,9,1")} className="bg-blue-600 text-white px-8 py-3 rounded-xl font-black text-xs shadow-lg hover:bg-blue-700">📷 AKTIFKAN QR SCANNER</button>
                                            </div>
                                            <div className="grid grid-cols-3 gap-4">
                                                <div><label className="text-[10px] font-black text-gray-400 uppercase">CC NO</label><input type="text" className="w-full border-2 p-3 rounded-xl font-bold bg-blue-50" value={formData.ccno} readOnly /></div>
                                                <div><label className="text-[10px] font-black text-gray-400 uppercase">Spec</label><input type="text" className="w-full border-2 p-3 rounded-xl font-bold bg-blue-50" value={formData.spec} readOnly /></div>
                                                <div><label className="text-[10px] font-black text-gray-400 uppercase">Raw Material Size</label><input type="text" className="w-full border-2 p-3 rounded-xl font-bold bg-blue-50" value={formData.rawSize} readOnly /></div>
                                                <div><label className="text-[10px] font-black text-gray-400 uppercase">Weight Raw</label><input type="text" className="w-full border-2 p-3 rounded-xl font-bold bg-blue-50" value={formData.weightRaw} readOnly /></div>
                                                <div><label className="text-[10px] font-black text-gray-400 uppercase">Qty FG</label><input type="number" className="w-full border-2 p-3 rounded-xl font-bold" /></div>
                                                <div><label className="text-[10px] font-black text-gray-400 uppercase">Qty NG</label><input type="number" className="w-full border-2 p-3 rounded-xl font-bold" /></div>
                                                <div><label className="text-[10px] font-black text-gray-400 uppercase">Start Proc</label><input type="time" className="w-full border-2 p-3 rounded-xl font-bold" /></div>
                                                <div><label className="text-[10px] font-black text-gray-400 uppercase">End Proc</label><input type="time" className="w-full border-2 p-3 rounded-xl font-bold" /></div>
                                                <div><label className="text-[10px] font-black text-gray-400 uppercase">Remark</label><input type="text" className="w-full border-2 p-3 rounded-xl font-bold" /></div>
                                            </div>
                                        </div>
                                    )}

                                    {/* FORM 3: DOWNTIME */}
                                    {activeTab === 'downtime' && (
                                        <div className="grid grid-cols-3 gap-4">
                                            <div><label className="text-[10px] font-black text-gray-400 uppercase">TBM</label><input type="number" className="w-full border-2 p-3 rounded-xl font-bold" /></div>
                                            <div><label className="text-[10px] font-black text-gray-400 uppercase">Wait MC</label><input type="number" className="w-full border-2 p-3 rounded-xl font-bold" /></div>
                                            <div><label className="text-[10px] font-black text-gray-400 uppercase">Wait Hagumi</label><input type="number" className="w-full border-2 p-3 rounded-xl font-bold" /></div>
                                            <div><label className="text-[10px] font-black text-gray-400 uppercase">Machine Problem</label><input type="number" className="w-full border-2 p-3 rounded-xl font-bold" /></div>
                                            <div><label className="text-[10px] font-black text-gray-400 uppercase">Cleaning Mesin</label><input type="number" className="w-full border-2 p-3 rounded-xl font-bold" /></div>
                                            <div><label className="text-[10px] font-black text-gray-400 uppercase">Hagumi/Separator</label><input type="number" className="w-full border-2 p-3 rounded-xl font-bold" /></div>
                                        </div>
                                    )}
                                </div>

                                <div className="p-6 border-t bg-gray-50 flex justify-end gap-3">
                                    <button onClick={() => setShowAddModal(false)} className="px-8 py-3 text-gray-400 font-black text-xs uppercase">Batal</button>
                                    <button className="bg-green-600 text-white px-10 py-3 rounded-2xl font-black text-xs shadow-xl hover:bg-green-700 transform active:scale-95 transition-all uppercase tracking-widest">Simpan Data Lengkap</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
