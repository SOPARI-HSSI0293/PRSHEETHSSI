<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Report System - PT. HSSI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        .excel-table { border-collapse: collapse; width: 100%; font-size: 11px; }
        .excel-table th, .excel-table td { border: 1px solid #000; padding: 4px; text-align: center; vertical-align: middle; white-space: nowrap; }
        .excel-table th { background-color: #f3f4f6; font-weight: bold; position: sticky; top: 0; z-index: 10; }
        .excel-table thead tr:nth-child(2) th { top: 29px; background-color: #e0f2fe; }
        .excel-table tbody tr:hover { background-color: #fef08a; }
        
        .sticky-col { position: sticky; left: 0; background-color: #fff; z-index: 5; border-right: 2px solid #000 !important; }
        .excel-table th.sticky-col { z-index: 15; background-color: #f3f4f6; }

        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .modal-overlay { background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); z-index: 9999; }
        
        .login-bg { min-height: 100vh; background: linear-gradient(135deg, #3b5cb8 0%, #7c4fa0 40%, #c0392b 100%); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: flex-end; }
        .login-bg::before { content: ''; position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='rgba(255,255,255,0.07)' stroke-width='1.5'%3E%3Ccircle cx='60' cy='60' r='50'/%3E%3Ccircle cx='60' cy='60' r='35'/%3E%3Ccircle cx='60' cy='60' r='20'/%3E%3Cpath d='M10 60 Q35 30 60 60 Q85 90 110 60'/%3E%3Cpath d='M60 10 Q90 35 60 60 Q30 85 60 110'/%3E%3C/g%3E%3C/svg%3E"); background-size: 120px 120px; }
        .login-card { position: relative; z-index: 10; background: rgba(255,255,255,0.12); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.25); width: 420px; min-height: 100vh; padding: 60px 48px; display: flex; flex-direction: column; justify-content: center; box-shadow: -12px 0 60px rgba(0,0,0,0.3); }
        .login-left { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 60px 80px; position: relative; z-index: 10; }
        .login-input-wrap { position: relative; margin-bottom: 14px; }
        .login-input-wrap input { width: 100%; background: rgba(255,255,255,0.95); border: 2px solid transparent; border-radius: 6px; padding: 12px 14px 12px 44px; font-size: 14px; color: #1a1a2e; outline: none; transition: border-color 0.2s, box-shadow 0.2s; box-sizing: border-box; }
        .login-input-wrap input:focus { border-color: #f39c12; box-shadow: 0 0 0 3px rgba(243,156,18,0.25); }
        .login-input-wrap .input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); color: #888; pointer-events: none; }
        .login-input-wrap .toggle-pw { position: absolute; right: 13px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #888; background: none; border: none; padding: 0; }
        .btn-signin { width: 100%; background: #27ae60; color: white; font-weight: 800; font-size: 13px; letter-spacing: 2px; text-transform: uppercase; border: none; border-radius: 6px; padding: 14px; cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 6px; }
        .btn-signin:hover { background: #1e8449; }
        .btn-signin:disabled { background: #7f8c8d; cursor: not-allowed; }
        .login-error { background: rgba(231,76,60,0.2); border: 1px solid rgba(231,76,60,0.6); color: #fce4e4; border-radius: 6px; padding: 10px 14px; font-size: 13px; margin-top: 12px; text-align: center; }
        .login-divider { width: 200px; height: 2px; background: rgba(255,255,255,0.4); margin: 16px auto; }

        .collapse-content { transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out; overflow: hidden; }

        @media print {
            .no-print { display: none !important; }
            .excel-table { font-size: 8pt; }
            @page { size: landscape; margin: 10mm; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // PASTIKAN API_URL INI SESUAI DENGAN DEPLOYMENT BARU ANDA
        const API_URL = 'https://script.google.com/macros/s/AKfycbxtYvl-g9l0GhIIEYkKFGnI31MFExXj92YRayum1nePexSSeIbyOalk6a1Pcq8vdmx4/exec';

        const IconDashboard = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>;
        const IconReport = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>;
        const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
        const IconAnalyze = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><circle cx="12" cy="12" r="3"/></svg>;
        const IconPrint = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" x2="21" y1="12" y2="12"/><line x1="3" x2="21" y1="6" y2="6"/><line x1="3" x2="21" y1="18" y2="18"/></svg>;
        const IconChevronDown = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;
        const IconChevronUp = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>;

        // =====================================================================
        // KOMPONEN: MODUL PRODUCTION REPORT 
        // =====================================================================
        const ProductionReportModule = ({ user }) => {
            const [rows, setRows] = useState([]);
            const [loading, setLoading] = useState(false);
            const [masterSpecs, setMasterSpecs] = useState({});
            
            const [displayMembers, setDisplayMembers] = useState(Array(10).fill(''));
            
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [activeTab, setActiveTab] = useState('HEADER'); 
            const [showScanner, setShowScanner] = useState(false);

            const [isProsesOpen, setIsProsesOpen] = useState(true);
            const [isDowntimeOpen, setIsDowntimeOpen] = useState(true);

            const [formHeader, setFormHeader] = useState({ 
                tanggal: new Date().toISOString().split('T')[0], 
                line: user.name, 
                leader: '', 
                ot: '', 
                members: Array(10).fill('') 
            });
            const [formProses, setFormProses] = useState({
                ccno: '', customer: '', spec: '', raw_mat_size: '', actual_width: '', 
                weight_raw: '', weight_cb: '', product_size: '', qty_fg: '', qty_ng: '', 
                qty_total: '', total_length: '', coil_set: '', start_proc: '', end_proc: '', 
                prod_keluar: '', line_speed: '', remark: ''
            });
            const [formDowntime, setFormDowntime] = useState({
                tbm: '', packing_cb: '', waiting_mc: '', waiting_hagumi: '', waiting_crane: '', 
                hagumi_sep: '', winder: '', cleaning: '', machine_prob: '', other: ''
            });

            useEffect(() => { loadData(); }, [formHeader.tanggal]);

            useEffect(() => {
                let html5QrcodeScanner;
                if (showScanner && activeTab === 'INPUT DATA' && isProsesOpen) {
                    html5QrcodeScanner = new Html5QrcodeScanner("qr-reader", { fps: 10, qrbox: {width: 250, height: 250} });
                    html5QrcodeScanner.render((decodedText) => {
                        handleQrScan(decodedText);
                        html5QrcodeScanner.clear();
                        setShowScanner(false);
                    }, (err) => { });
                }
                return () => { if(html5QrcodeScanner) html5QrcodeScanner.clear().catch(e => console.log(e)); };
            }, [showScanner, activeTab, isProsesOpen]);

            const loadData = async () => {
                setLoading(true);
                try {
                    const response = await fetch(`${API_URL}?action=getData&date=${formHeader.tanggal}&line=${formHeader.line}`);
                    const result = await response.json();
                    if (result.success) {
                        setRows(result.data);
                        if(result.specs) setMasterSpecs(result.specs);
                        
                        let newMembers = Array(10).fill('');
                        if(result.members) {
                            const arr = result.members.split(',').map(m => m.trim());
                            arr.forEach((val, idx) => { if(idx < 10) newMembers[idx] = val; });
                        }
                        setDisplayMembers(newMembers);

                        setFormHeader(prev => ({
                            ...prev,
                            leader: result.headerInfo && result.headerInfo.leader ? result.headerInfo.leader : '',
                            ot: result.headerInfo && result.headerInfo.ot ? result.headerInfo.ot : '',
                            members: newMembers
                        }));
                    }
                } catch (e) { console.error("Load failed", e); }
                setLoading(false);
            };

            const calculateTotals = () => {
                const coil = rows.length;
                const berat = rows.reduce((acc, row) => acc + (parseFloat(row.weight || row.weight_raw || row['Weight Raw Material']) || 0), 0);
                return { coil, berat: berat.toFixed(2) };
            };

            const totals = calculateTotals();

            const handleQrScan = (decodedText) => {
                try {
                    const parts = decodedText.split(',');
                    if (parts.length >= 6) {
                        const rawCcNo = parts[0];
                        const ccno = rawCcNo.substring(0, Math.max(0, rawCcNo.length - 1));
                        const specCode = parts[1] ? parts[1].trim() : ''; 
                        const specName = masterSpecs[specCode] || specCode; 
                        const rawMatSize = parts[2] ? parts[2].trim() : '';
                        const weight = parts[5] ? parts[5].trim() : '';

                        setFormProses(prev => ({
                            ...prev, 
                            ccno: ccno, 
                            spec: specName, 
                            raw_mat_size: rawMatSize, 
                            weight_raw: weight 
                        }));
                        alert("Data QR Material Berhasil Diekstrak!");
                    } else { alert("Format QR tidak sesuai rule."); }
                } catch(e) { alert("Error parsing QR: " + e.message); }
            };

            const handleMemberChange = (index, value) => {
                const newMembers = [...formHeader.members];
                newMembers[index] = value;
                setFormHeader({ ...formHeader, members: newMembers });
            };

            // FUNGSI BARU: Set Waktu Saat Ini
            const setTimeNow = (field) => {
                const now = new Date();
                const hours = String(now.getHours()).padStart(2, '0');
                const minutes = String(now.getMinutes()).padStart(2, '0');
                const timeString = `${hours}:${minutes}`;
                setFormProses(prev => ({ ...prev, [field]: timeString }));
            };

            const submitData = async () => {
                setLoading(true);
                const combinedMembers = formHeader.members
                    .filter(m => m.trim() !== '')
                    .join(', ');

                const payload = { 
                    action: 'saveData', 
                    header: { ...formHeader, member: combinedMembers }, 
                    proses: formProses, 
                    downtime: formDowntime 
                };

                try {
                    const res = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });
                    const result = await res.json();
                    if(result.status === 'success') {
                        alert(result.message || "Data Tersimpan");
                        setIsFormOpen(false);
                        loadData(); 
                    } else { alert("Gagal: " + result.message); }
                } catch(e) { alert("Error koneksi!"); }
                setLoading(false);
            };

            const openForm = () => {
                setFormProses({ ccno: '', customer: '', spec: '', raw_mat_size: '', actual_width: '', weight_raw: '', weight_cb: '', product_size: '', qty_fg: '', qty_ng: '', qty_total: '', total_length: '', coil_set: '', start_proc: '', end_proc: '', prod_keluar: '', line_speed: '', remark: '' });
                setFormDowntime({ tbm: '', packing_cb: '', waiting_mc: '', waiting_hagumi: '', waiting_crane: '', hagumi_sep: '', winder: '', cleaning: '', machine_prob: '', other: '' });
                
                setIsProsesOpen(true);
                setIsDowntimeOpen(true);
                
                setIsFormOpen(true);
                setActiveTab('HEADER');
            };

            const inputStyle = "w-full border border-gray-300 p-2 rounded text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none";
            const labelStyle = "block text-xs font-bold text-gray-700 mb-1 mt-3 uppercase";

            return (
                <div className="bg-white rounded-lg shadow-lg border border-black flex flex-col p-2 min-h-screen relative">
                    
                    {/* Header Controls */}
                    <div className="bg-white p-4 border-b-2 border-gray-800 flex flex-wrap gap-4 items-end justify-between no-print mb-4">
                        <div className="flex flex-wrap gap-4 items-end">
                            <div><label className="block text-xs font-bold mb-1 uppercase">Tanggal</label>
                                <input type="date" className="border p-2 rounded text-sm w-40 font-bold" value={formHeader.tanggal} onChange={e => setFormHeader({...formHeader, tanggal: e.target.value})} />
                            </div>
                            <div><label className="block text-xs font-bold mb-1 uppercase">Line</label>
                                <input type="text" readOnly className="border p-2 rounded text-sm w-32 bg-gray-100 font-bold text-center" value={formHeader.line} />
                            </div>
                            <button onClick={loadData} className="bg-blue-100 text-blue-700 p-2 rounded hover:bg-blue-200 transition"><IconDashboard /></button>
                        </div>
                        
                        <div className="flex flex-wrap gap-2">
                            <button onClick={openForm} className="bg-green-600 text-white px-4 py-2 rounded font-bold text-xs flex items-center gap-2 hover:bg-green-700 shadow-sm uppercase">+ Input Data</button>
                            <button onClick={() => window.print()} className="bg-gray-800 text-white px-4 py-2 rounded font-bold text-xs flex items-center gap-2 hover:bg-gray-900 shadow-sm uppercase">Print</button>
                        </div>
                    </div>

                    {/* MODAL FORM INPUT */}
                    {isFormOpen && (
                        <div className="fixed inset-0 modal-overlay flex justify-center items-center p-4">
                            <div className="bg-white w-full max-w-5xl rounded-lg shadow-2xl flex flex-col max-h-[95vh]">
                                <div className="bg-gray-800 text-white px-6 py-4 flex justify-between items-center rounded-t-lg">
                                    <h2 className="text-lg font-bold uppercase tracking-wider">Form Input Production</h2>
                                    <button onClick={() => setIsFormOpen(false)} className="text-white hover:text-red-400 text-2xl font-bold">&times;</button>
                                </div>
                                
                                <div className="flex border-b bg-gray-100">
                                    {['HEADER', 'INPUT DATA'].map(tab => (
                                        <button key={tab} onClick={() => setActiveTab(tab)} className={`flex-1 py-3 text-sm font-bold uppercase tracking-wider ${activeTab === tab ? 'bg-white border-t-4 border-blue-600 text-blue-700' : 'text-gray-500 hover:bg-gray-200'}`}>
                                            {tab === 'INPUT DATA' ? 'DATA PROSES & DOWNTIME' : tab}
                                        </button>
                                    ))}
                                </div>

                                <div className="p-6 overflow-y-auto flex-1 bg-white hide-scrollbar">
                                    
                                    {/* TAB: HEADER */}
                                    {activeTab === 'HEADER' && (
                                        <div className="space-y-4">
                                            <div className="grid grid-cols-2 gap-4">
                                                <div><label className={labelStyle}>Tanggal</label><input type="date" className={inputStyle} value={formHeader.tanggal} onChange={e => setFormHeader({...formHeader, tanggal: e.target.value})} /></div>
                                                <div><label className={labelStyle}>Line</label><input type="text" readOnly className={`${inputStyle} bg-gray-100`} value={formHeader.line} /></div>
                                                <div><label className={labelStyle}>Leader</label><input type="text" className={inputStyle} value={formHeader.leader} onChange={e => setFormHeader({...formHeader, leader: e.target.value})} /></div>
                                                <div><label className={labelStyle}>OT (Jam)</label><input type="text" className={inputStyle} value={formHeader.ot} onChange={e => setFormHeader({...formHeader, ot: e.target.value})} /></div>
                                            </div>
                                            
                                            <div className="mt-4 border-t pt-4">
                                                <label className="block text-xs font-black text-blue-700 uppercase mb-2">Input Member (10 Orang)</label>
                                                <div className="grid grid-cols-2 gap-2">
                                                    {formHeader.members.map((m, idx) => (
                                                        <div key={idx} className="flex items-center gap-2">
                                                            <span className="text-[10px] font-bold w-4">{idx + 1}.</span>
                                                            <input type="text" className={inputStyle} placeholder={`Nama Member ${idx + 1}`} value={m} onChange={e => handleMemberChange(idx, e.target.value)} />
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* TAB: GABUNGAN INPUT PROSES & DOWNTIME */}
                                    {activeTab === 'INPUT DATA' && (
                                        <div>
                                            
                                            {/* ACCORDION BAGIAN PROSES */}
                                            <div 
                                                className="flex justify-between items-center bg-blue-50 border border-blue-200 p-3 rounded-lg cursor-pointer hover:bg-blue-100 transition shadow-sm mb-2"
                                                onClick={() => setIsProsesOpen(!isProsesOpen)}
                                            >
                                                <h3 className="font-bold text-blue-800 uppercase tracking-wide flex items-center gap-2">
                                                    <span className="bg-blue-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">1</span> 
                                                    Data Proses Produksi
                                                </h3>
                                                <span className="text-blue-800">{isProsesOpen ? <IconChevronUp /> : <IconChevronDown />}</span>
                                            </div>

                                            {isProsesOpen && (
                                                <div className="mb-6 px-2 animate-fade-in">
                                                    <div className="mb-4 bg-yellow-50 p-4 border border-yellow-200 rounded-lg flex justify-between items-center">
                                                        <div className="text-sm font-bold text-yellow-800">Scan QR untuk Auto-Fill Material Data</div>
                                                        <button type="button" onClick={() => setShowScanner(!showScanner)} className="bg-yellow-500 text-white px-4 py-2 rounded text-xs font-bold uppercase hover:bg-yellow-600 shadow-sm">{showScanner ? 'Tutup Scanner' : 'Buka Scanner'}</button>
                                                    </div>
                                                    {showScanner && <div id="qr-reader" className="w-full max-w-md mx-auto mb-6 border-2 border-dashed border-gray-300 p-2 rounded"></div>}

                                                    <div className="grid grid-cols-3 gap-4">
                                                        <div><label className={labelStyle}>CC No (QR)</label><input type="text" className={inputStyle} value={formProses.ccno} onChange={e => setFormProses({...formProses, ccno: e.target.value})} /></div>
                                                        <div><label className={labelStyle}>Spec (QR)</label><input type="text" className={inputStyle} value={formProses.spec} onChange={e => setFormProses({...formProses, spec: e.target.value})} /></div>
                                                        <div><label className={labelStyle}>Raw Material Size (QR)</label><input type="text" className={inputStyle} value={formProses.raw_mat_size} onChange={e => setFormProses({...formProses, raw_mat_size: e.target.value})} /></div>
                                                        <div><label className={labelStyle}>Weight Raw (QR)</label><input type="text" className={inputStyle} value={formProses.weight_raw} onChange={e => setFormProses({...formProses, weight_raw: e.target.value})} /></div>
                                                        <div><label className={labelStyle}>Customer</label><input type="text" className={inputStyle} value={formProses.customer} onChange={e => setFormProses({...formProses, customer: e.target.value})} /></div>
                                                        <div><label className={labelStyle}>Actual Width Raw</label><input type="text" className={inputStyle} value={formProses.actual_width} onChange={e => setFormProses({...formProses, actual_width: e.target.value})} /></div>
                                                        <div><label className={labelStyle}>Weight Coil Back</label><input type="text" className={inputStyle} value={formProses.weight_cb} onChange={e => setFormProses({...formProses, weight_cb: e.target.value})} /></div>
                                                        <div><label className={labelStyle}>Product Size</label><input type="text" className={inputStyle} value={formProses.product_size} onChange={e => setFormProses({...formProses, product_size: e.target.value})} /></div>
                                                        <div><label className={labelStyle}>Qty FG</label><input type="number" className={inputStyle} value={formProses.qty_fg} onChange={e => setFormProses({...formProses, qty_fg: e.target.value})} /></div>
                                                        <div><label className={labelStyle}>Qty NG</label><input type="number" className={inputStyle} value={formProses.qty_ng} onChange={e => setFormProses({...formProses, qty_ng: e.target.value})} /></div>
                                                        <div><label className={labelStyle}>Qty Total</label><input type="number" className={inputStyle} value={formProses.qty_total} onChange={e => setFormProses({...formProses, qty_total: e.target.value})} /></div>
                                                        <div><label className={labelStyle}>Total Length</label><input type="text" className={inputStyle} value={formProses.total_length} onChange={e => setFormProses({...formProses, total_length: e.target.value})} /></div>
                                                        
                                                        {/* --- MODIFIKASI INPUT WAKTU DENGAN TOMBOL 'NOW' --- */}
                                                        <div>
                                                            <label className={labelStyle}>Coil Set Lifter</label>
                                                            <div className="flex gap-1">
                                                                <input type="time" className={inputStyle} value={formProses.coil_set} onChange={e => setFormProses({...formProses, coil_set: e.target.value})} />
                                                                <button type="button" onClick={() => setTimeNow('coil_set')} className="bg-blue-100 text-blue-700 px-3 rounded border border-blue-300 hover:bg-blue-200 font-bold text-xs whitespace-nowrap">NOW</button>
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <label className={labelStyle}>Start Proses</label>
                                                            <div className="flex gap-1">
                                                                <input type="time" className={inputStyle} value={formProses.start_proc} onChange={e => setFormProses({...formProses, start_proc: e.target.value})} />
                                                                <button type="button" onClick={() => setTimeNow('start_proc')} className="bg-blue-100 text-blue-700 px-3 rounded border border-blue-300 hover:bg-blue-200 font-bold text-xs whitespace-nowrap">NOW</button>
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <label className={labelStyle}>End Proses</label>
                                                            <div className="flex gap-1">
                                                                <input type="time" className={inputStyle} value={formProses.end_proc} onChange={e => setFormProses({...formProses, end_proc: e.target.value})} />
                                                                <button type="button" onClick={() => setTimeNow('end_proc')} className="bg-blue-100 text-blue-700 px-3 rounded border border-blue-300 hover:bg-blue-200 font-bold text-xs whitespace-nowrap">NOW</button>
                                                            </div>
                                                        </div>
                                                        <div>
                                                            <label className={labelStyle}>Produk Keluar</label>
                                                            <div className="flex gap-1">
                                                                <input type="time" className={inputStyle} value={formProses.prod_keluar} onChange={e => setFormProses({...formProses, prod_keluar: e.target.value})} />
                                                                <button type="button" onClick={() => setTimeNow('prod_keluar')} className="bg-blue-100 text-blue-700 px-3 rounded border border-blue-300 hover:bg-blue-200 font-bold text-xs whitespace-nowrap">NOW</button>
                                                            </div>
                                                        </div>
                                                        {/* ------------------------------------------------ */}

                                                        <div><label className={labelStyle}>Line Speed</label><input type="text" className={inputStyle} value={formProses.line_speed} onChange={e => setFormProses({...formProses, line_speed: e.target.value})} /></div>
                                                        <div className="col-span-2"><label className={labelStyle}>Remark</label><input type="text" className={inputStyle} value={formProses.remark} onChange={e => setFormProses({...formProses, remark: e.target.value})} /></div>
                                                    </div>
                                                </div>
                                            )}

                                            <div className="relative my-6">
                                                <div className="absolute inset-0 flex items-center" aria-hidden="true"><div className="w-full border-t-2 border-dashed border-gray-300"></div></div>
                                            </div>

                                            {/* ACCORDION BAGIAN DOWNTIME */}
                                            <div 
                                                className="flex justify-between items-center bg-red-50 border border-red-200 p-3 rounded-lg cursor-pointer hover:bg-red-100 transition shadow-sm mb-2"
                                                onClick={() => setIsDowntimeOpen(!isDowntimeOpen)}
                                            >
                                                <h3 className="font-bold text-red-800 uppercase tracking-wide flex items-center gap-2">
                                                    <span className="bg-red-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">2</span> 
                                                    Data Downtime (Loss Time)
                                                </h3>
                                                <span className="text-red-800">{isDowntimeOpen ? <IconChevronUp /> : <IconChevronDown />}</span>
                                            </div>

                                            {isDowntimeOpen && (
                                                <div className="mb-4 px-2 animate-fade-in">
                                                    <div className="grid grid-cols-3 gap-4 bg-gray-50 p-4 border rounded-lg border-gray-200">
                                                        {['tbm', 'packing_cb', 'waiting_mc', 'waiting_hagumi', 'waiting_crane', 'hagumi_sep', 'winder', 'cleaning', 'machine_prob', 'other'].map(dt => (
                                                            <div key={dt}>
                                                                <label className={labelStyle}>{dt.replace(/_/g, ' ')} (Menit)</label>
                                                                <input type="number" className={inputStyle} value={formDowntime[dt]} onChange={e => setFormDowntime({...formDowntime, [dt]: e.target.value})} />
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>
                                
                                <div className="bg-gray-100 p-4 border-t flex justify-end gap-3 rounded-b-lg">
                                    <button onClick={() => setIsFormOpen(false)} className="px-6 py-2 rounded font-bold text-gray-600 bg-gray-200 hover:bg-gray-300">Batal / Tutup</button>
                                    <button onClick={submitData} disabled={loading} className="px-6 py-2 rounded font-bold text-white bg-blue-600 hover:bg-blue-700 shadow-lg">
                                        {loading ? 'Menyimpan...' : 'Simpan Data'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Print Header */}
                    <div className="w-full flex justify-between items-end mb-4 border-b-2 border-black pb-2 px-2">
                        <div className="w-1/3 text-lg font-bold">Tanggal : <span className="border-b border-black min-w-[150px] inline-block ml-2">{new Date(formHeader.tanggal).toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'})}</span></div>
                        <div className="w-1/3 text-center"><h1 className="text-3xl font-black tracking-widest uppercase">PRODUCTION REPORT</h1></div>
                        <div className="w-1/3 flex justify-end gap-4 font-bold">
                            <div className="border-2 border-black p-2 min-w-[80px] text-center"><div className="text-[10px]">LINE</div><div>{formHeader.line}</div></div>
                            <div className="border-2 border-black p-2 min-w-[80px] text-center flex items-center justify-center"><span className="mr-2 text-[10px]">OT</span> <span className="border-b border-black w-10"></span></div>
                        </div>
                    </div>

                    {/* Main Excel Table */}
                    <div className="overflow-x-auto overflow-y-auto" style={{ maxHeight: '55vh' }}>
                        <table className="excel-table">
                            <thead>
                                <tr>
                                    <th rowSpan="2" className="sticky-col no-print">Aksi</th>
                                    <th rowSpan="2" className="w-10">NO</th>
                                    <th rowSpan="2" className="w-32">CC NO</th>
                                    <th rowSpan="2" className="w-32">Customer</th>
                                    <th rowSpan="2" className="w-24">Spec</th>
                                    <th rowSpan="2" className="w-32">MC/Semi Size</th>
                                    <th rowSpan="2" className="w-24">Actual Width</th>
                                    <th rowSpan="2" className="w-20">Weight</th>
                                    <th rowSpan="2" className="w-32">Product Size</th>
                                    <th rowSpan="2" className="w-16">Qty FG</th>
                                    <th rowSpan="2" className="w-16">Qty NG</th>
                                    <th rowSpan="2" className="w-20">Qty Total</th>
                                    <th rowSpan="2" className="w-24">Total Length</th>
                                    <th rowSpan="2" className="w-20">Coil Set</th>
                                    <th rowSpan="2" className="w-20">Start</th>
                                    <th rowSpan="2" className="w-20">End</th>
                                    <th rowSpan="2" className="w-24">Produk Keluar</th>
                                    <th colSpan="10" className="bg-blue-100 uppercase">Down Time (Minutes)</th>
                                    <th rowSpan="2" className="w-24">Line Speed</th>
                                    <th rowSpan="2" className="w-48">Remark</th>
                                </tr>
                                <tr>
                                    <th className="bg-blue-50">TBM</th><th className="bg-blue-50">Packing</th><th className="bg-blue-50">Wait MC</th><th className="bg-blue-50">Wait Hagumi</th><th className="bg-blue-50">Wait Crane</th><th className="bg-blue-50">Hagumi/Sep</th><th className="bg-blue-50">Winder</th><th className="bg-blue-50">Cleaning</th><th className="bg-blue-50">Machine Prob</th><th className="bg-blue-50">Other</th>
                                </tr>
                            </thead>
                            <tbody>
                                {rows.length === 0 ? (
                                    <tr><td colSpan="28" className="p-8 text-gray-400 italic">BELUM ADA DATA UNTUK TANGGAL INI</td></tr>
                                ) : rows.map((r, i) => (
                                    <tr key={i}>
                                        <td className="sticky-col no-print bg-white"><div className="flex gap-2 justify-center"><button className="text-blue-600">✎</button><button className="text-red-600">🗑</button></div></td>
                                        <td>{i+1}</td>
                                        <td className="font-bold">{r.ccno || r['CC No'] || ''}</td>
                                        <td>{r.customer || r['Customer'] || ''}</td>
                                        <td>{r.spec || r['Spec'] || ''}</td>
                                        <td>{r.mc_semi_prod_size || r['Raw Material Size'] || ''}</td>
                                        <td>{r.actual_width_mc || r['Actual Width Raw Material'] || ''}</td>
                                        <td className="font-bold">{r.weight || r['Weight Raw Material'] || ''}</td>
                                        <td>{r.product_size || r['Product Size'] || ''}</td>
                                        <td>{r.qty_fg || r['Qty FG'] || ''}</td>
                                        <td>{r.qty_ng || r['Qty NG'] || ''}</td>
                                        <td className="font-bold bg-gray-100">{r.qty_total || r['Total'] || ''}</td>
                                        <td>{r.total_length || r['Total Length'] || ''}</td>
                                        <td>{r.coil_set_lifter || r['Coil Set Lifter'] || ''}</td>
                                        <td>{r.start_process || r['Start Proses'] || ''}</td>
                                        <td>{r.end_process || r['End Proses'] || ''}</td>
                                        <td>{r.produk_keluar_mesin || r['Product Keluar dari Mesin'] || ''}</td>
                                        <td className="bg-blue-50/30">{r.dt_tbm || r['TBM'] || ''}</td>
                                        <td className="bg-blue-50/30">{r.dt_packing_coil_back || r['Packing Coil Back'] || ''}</td>
                                        <td className="bg-blue-50/30">{r.dt_waiting_mc || r['Waiting MC'] || ''}</td>
                                        <td className="bg-blue-50/30">{r.dt_waiting_hagumi || r['Waiting Hagumi'] || ''}</td>
                                        <td className="bg-blue-50/30">{r.dt_waiting_crane || r['Waiting Crane'] || ''}</td>
                                        <td className="bg-blue-50/30">{r.dt_hagumi_separator || r['Hagumi/Separator'] || ''}</td>
                                        <td className="bg-blue-50/30">{r.dt_winder_top_end || r['Winder Top/End'] || ''}</td>
                                        <td className="bg-blue-50/30">{r.dt_cleaning_mesin || r['Cleaning Mesin'] || ''}</td>
                                        <td className="bg-blue-50/30">{r.dt_machine_problem || r['Machine Problem'] || ''}</td>
                                        <td className="bg-blue-50/30">{r.dt_other || r['Other'] || ''}</td>
                                        <td>{r.line_speed || r['Line Speed'] || ''}</td>
                                        <td className="text-left">{r.remark || r['Remark'] || ''}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {/* Footer Area - LINE MEMBER */}
                    <div className="mt-4 border border-black text-[10px] flex flex-wrap" style={{ pageBreakInside: 'avoid' }}>
                        <div className="w-1/4 border-r border-black p-2">
                            <div className="font-bold mb-1 uppercase bg-gray-100 text-center border-b border-black">Line Member</div>
                            <table className="w-full border-collapse border border-black text-center">
                                <tbody>
                                    {[0, 1, 2, 3, 4].map(i => (
                                        <tr key={i}>
                                            <td className="border border-black w-6 bg-gray-50 font-bold">{i + 1}</td>
                                            <td className="border border-black h-5 text-left px-1">{displayMembers[i]}</td>
                                            <td className="border border-black w-6 bg-gray-50 font-bold">{i + 6}</td>
                                            <td className="border border-black h-5 text-left px-1">{displayMembers[i + 5]}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                        <div className="w-1/4 border-r border-black p-2 flex flex-col justify-end">
                            <div className="text-right font-bold mb-2 uppercase">Total Proses</div>
                            <table className="w-full border-collapse border border-black">
                                <tbody>
                                    <tr><td className="border border-black p-1 bg-gray-50 uppercase">Coil / Skid</td><td className="border border-black p-1 text-center font-bold">{totals.coil}</td></tr>
                                    <tr><td className="border border-black p-1 bg-gray-50 uppercase">Berat</td><td className="border border-black p-1 text-center font-bold">{totals.berat}</td></tr>
                                </tbody>
                            </table>
                        </div>
                        <div className="w-2/5 border-r border-black p-2 bg-pink-100/50">
                            <div className="font-bold mb-1 uppercase">Definisi • Rule</div>
                            <p>• Coil set: Memasukkan Coil ke Drum (Persiapan, Visual cek, Scan).</p>
                            <p>• Start Process: Setelah bagian top coil ditarik recoiler / Running Otomatis.</p>
                            <p>• End Process: Setelah produk terlepas dari drum / Potongan terakhir.</p>
                            <p>• Down Time: Wajib diisi setiap kolom jika terjadi loss time.</p>
                        </div>
                        <div className="flex-1 p-2 flex flex-col">
                            <div className="border border-black flex-1 flex flex-col">
                                <div className="text-center border-b border-black py-1 uppercase">Cek Leader</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // =====================================================================
        // KOMPONEN: LOGIN PAGE
        // =====================================================================
        const LoginPage = ({ onLogin }) => {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');
            const [showPw, setShowPw] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async () => {
                if (!username.trim() || !password.trim()) {
                    setError('Username dan Password wajib diisi.');
                    return;
                }
                setLoading(true); setError('');

                const tryJSONP = () => new Promise((resolve, reject) => {
                    const cbName = 'cb_' + Date.now();
                    const script = document.createElement('script');
                    const timer = setTimeout(() => { delete window[cbName]; document.body.removeChild(script); reject(new Error('JSONP timeout')); }, 10000);
                    window[cbName] = (data) => { clearTimeout(timer); delete window[cbName]; document.body.removeChild(script); resolve(data); };
                    script.src = `${API_URL}?action=login&username=${encodeURIComponent(username.trim())}&password=${encodeURIComponent(password.trim())}&callback=${cbName}`;
                    script.onerror = () => { clearTimeout(timer); reject(new Error('JSONP script error')); };
                    document.body.appendChild(script);
                });

                const tryGet = async () => {
                    const url = `${API_URL}?action=login&username=${encodeURIComponent(username.trim())}&password=${encodeURIComponent(password.trim())}`;
                    const res = await fetch(url, { redirect: 'follow' });
                    return JSON.parse(await res.text());
                };

                const tryPost = async () => {
                    const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action: 'login', username: username.trim(), password: password.trim() }), redirect: 'follow' });
                    return JSON.parse(await res.text());
                };

                let result = null; let lastError = '';
                try { result = await tryJSONP(); } catch(e0) {
                    lastError = 'JSONP: ' + e0.message;
                    try { result = await tryGet(); } catch(e1) {
                        lastError += ' | GET: ' + e1.message;
                        try { result = await tryPost(); } catch(e2) {
                            lastError += ' | POST: ' + e2.message; result = null;
                        }
                    }
                }
                setLoading(false);
                if (!result) { setError(`Koneksi gagal (${lastError}). Pastikan URL API benar.`); return; }
                if (result.status === 'success') { onLogin(result.user); } else { setError(result.message || 'Username atau Password Salah!'); }
            };

            return (
                <div className="login-bg">
                    <div className="login-left">
                        <div style={{ marginBottom: '40px' }}><div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '8px' }}><div style={{ width: '48px', height: '48px', borderRadius: '12px', background: 'rgba(255,255,255,0.2)', border: '2px solid rgba(255,255,255,0.5)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div><span style={{ color: 'white', fontSize: '22px', fontWeight: '900', letterSpacing: '3px', textTransform: 'uppercase' }}>HSSI <span style={{ color: '#fbbf24' }}>System</span></span></div></div>
                        <h2 style={{ padding: 0, fontSize: '2.8rem', fontWeight: '800', color: 'white', lineHeight: 1.2, textShadow: '0 2px 20px rgba(0,0,0,0.3)' }}>Prod Report<br />hanwa<br />versi 1<br />company to the<br />next level</h2>
                    </div>
                    <div className="login-card">
                        <div style={{ textAlign: 'center', marginBottom: '28px' }}><h1 style={{ color: 'white', fontSize: '18px', fontWeight: '900', letterSpacing: '1px', lineHeight: 1.3, textTransform: 'uppercase', textShadow: '0 1px 8px rgba(0,0,0,0.3)' }}>PT HANWA STEEL SERVICE<br />INDONESIA</h1><div className="login-divider" style={{ margin: '14px auto' }}></div><p style={{ color: 'rgba(255,255,255,0.85)', fontSize: '14px', fontWeight: '500' }}>Sign in to your account</p></div>
                        <div>
                            <div className="login-input-wrap"><span className="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><input type="text" placeholder="Username" value={username} onChange={e => setUsername(e.target.value)} onKeyDown={e => {if(e.key === 'Enter') handleLogin()}} disabled={loading} /></div>
                            <div className="login-input-wrap"><span className="input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span><input type={showPw ? 'text' : 'password'} placeholder="Password" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => {if(e.key === 'Enter') handleLogin()}} disabled={loading} /><button className="toggle-pw" onClick={() => setShowPw(!showPw)}>{showPw ? '👁️' : '🔒'}</button></div>
                            <button className="btn-signin" onClick={handleLogin} disabled={loading}>{loading ? 'Signing in...' : 'Sign In'}</button>
                            {error && <div className="login-error">{error}</div>}
                        </div>
                    </div>
                </div>
            );
        };

        // =====================================================================
        // KOMPONEN: MAIN LAYOUT
        // =====================================================================
        const App = () => {
            const [user, setUser] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [activeMenu, setActiveMenu] = useState('menu1');

            const menus = [
                { id: 'menu1', title: 'Production Report', icon: <IconReport /> },
                { id: 'menu2', title: 'Dashboard Monitor', icon: <IconDashboard /> },
                { id: 'menu3', title: 'Upload Planning', icon: <IconUpload /> },
                { id: 'menu4', title: 'OEE Analysis', icon: <IconAnalyze /> },
                { id: 'menu5', title: 'Print NG Report', icon: <IconPrint /> },
            ];

            if (!user) return <LoginPage onLogin={(u) => setUser(u)} />;

            return (
                <div className="flex h-screen bg-[#f4f6f9] overflow-hidden">
                    <div className={`bg-[#2c323a] text-[#aab3bc] transition-all duration-300 flex flex-col shadow-xl z-20 ${isSidebarOpen ? 'w-64' : 'w-20'}`}>
                        <div className="h-[60px] bg-[#22272e] flex items-center justify-center border-b border-[#1e2228]">{isSidebarOpen ? <span className="font-bold text-xl text-white tracking-widest uppercase">HSSI <span className="text-blue-500">SYSTEM</span></span> : <span className="text-blue-500 font-bold">HS</span>}</div>
                        <div className="flex-1 overflow-y-auto py-6">
                            <ul className="space-y-1">
                                {menus.map((menu) => (
                                    <li key={menu.id}><button onClick={() => setActiveMenu(menu.id)} className={`w-full flex items-center py-3 transition-all border-l-4 ${activeMenu === menu.id ? 'bg-[#252a31] border-blue-500 text-white' : 'border-transparent hover:bg-[#252a31] hover:text-white'} ${isSidebarOpen ? 'px-5' : 'justify-center'}`}><span className={`${activeMenu === menu.id ? 'text-blue-500' : ''}`}>{menu.icon}</span>{isSidebarOpen && <span className="ml-4 text-sm font-medium tracking-wide">{menu.title}</span>}</button></li>
                                ))}
                            </ul>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col overflow-hidden relative">
                        <header className="h-[60px] bg-[#a84444] shadow-md flex items-center px-4 z-10 gap-4 no-print justify-between">
                            <div className="flex items-center gap-4"><button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="text-white p-2 hover:bg-[#913b3b] rounded transition-colors"><IconMenu /></button><h1 className="text-lg font-bold text-white uppercase tracking-wider">{menus.find(m => m.id === activeMenu)?.title}</h1></div>
                            <div className="flex items-center gap-3">
                                <div className="text-right"><div className="text-white text-sm font-bold leading-tight">{user.name}</div><div className="text-red-200 text-xs leading-tight uppercase tracking-wide">{user.role}</div></div>
                                <button onClick={() => { if(window.confirm('Yakin ingin logout?')) setUser(null); }} className="text-white p-2 hover:bg-[#913b3b] rounded"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg></button>
                            </div>
                        </header>
                        <main className="flex-1 overflow-auto p-4 sm:p-6 bg-[#f4f6f9]">
                            {activeMenu === 'menu1' ? <ProductionReportModule user={user} /> : <div className="p-20 text-center bg-white rounded shadow-lg border-t-4 border-blue-600"><h2 className="text-3xl font-black text-gray-300 uppercase italic tracking-tighter">Module Under Development</h2></div>}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
