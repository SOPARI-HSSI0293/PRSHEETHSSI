<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Report System - PT. HSSI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        /* Excel Table Styles dari Kode Anda */
        .excel-table { border-collapse: collapse; width: 100%; font-size: 11px; }
        .excel-table th, .excel-table td { border: 1px solid #000; padding: 4px; text-align: center; vertical-align: middle; white-space: nowrap; }
        .excel-table th { background-color: #f3f4f6; font-weight: bold; position: sticky; top: 0; z-index: 10; }
        .excel-table thead tr:nth-child(2) th { top: 29px; background-color: #e0f2fe; }
        .excel-table tbody tr:hover { background-color: #fef08a; }
        
        .sticky-col { position: sticky; left: 0; background-color: #fff; z-index: 5; border-right: 2px solid #000 !important; }
        .excel-table th.sticky-col { z-index: 15; background-color: #f3f4f6; }

        /* Loading Spinner */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .modal-overlay { background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); }
        
        @media print {
            .no-print { display: none !important; }
            .excel-table { font-size: 8pt; }
            @page { size: landscape; margin: 10mm; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // URL API GOOGLE APPS SCRIPT ANDA
        const API_URL = 'https://script.google.com/macros/s/AKfycbyDnnnHIkF_ysjggqZR56pYcaT_t-YLVInwaufzvp6OvZCAviMirwpMyR92Gu6jKtxguA/exec';

        // --- IKON SVG ---
        const IconDashboard = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>;
        const IconReport = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>;
        const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
        const IconAnalyze = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><circle cx="12" cy="12" r="3"/></svg>;
        const IconPrint = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" x2="21" y1="12" y2="12"/><line x1="3" x2="21" y1="6" y2="6"/><line x1="3" x2="21" y1="18" y2="18"/></svg>;

        // =====================================================================
        // KOMPONEN: MODUL PRODUCTION REPORT (Hasil Migrasi Kode Anda)
        // =====================================================================
        const ProductionReportModule = ({ user }) => {
            const [rows, setRows] = useState([]);
            const [loading, setLoading] = useState(false);
            const [header, setHeader] = useState({ 
                tanggal: new Date().toISOString().split('T')[0], 
                line: user.name, 
                ot: '' 
            });
            const [members, setMembers] = useState(Array(10).fill(''));
            const [showScanner, setShowScanner] = useState(false);
            const scannerRef = useRef(null);

            // Fetch Data saat komponen dimuat
            useEffect(() => { loadData(); }, [header.tanggal]);

            const loadData = async () => {
                setLoading(true);
                try {
                    const response = await fetch(`${API_URL}?action=getData&date=${header.tanggal}&line=${header.line}`);
                    const result = await response.json();
                    if (result.success) setRows(result.data);
                } catch (e) { console.error("Load failed", e); }
                setLoading(false);
            };

            const calculateTotals = () => {
                const coil = rows.length;
                const berat = rows.reduce((acc, row) => acc + (parseFloat(row.weight) || 0), 0);
                return { coil, berat: berat.toFixed(2) };
            };

            const totals = calculateTotals();

            return (
                <div className="bg-white rounded-lg shadow-lg border border-black flex flex-col p-2 min-h-screen">
                    
                    {/* Header Controls (No Print) */}
                    <div className="bg-white p-4 border-b-2 border-gray-800 flex flex-wrap gap-4 items-end justify-between no-print mb-4">
                        <div className="flex flex-wrap gap-4 items-end">
                            <div><label className="block text-xs font-bold mb-1 uppercase">Tanggal</label>
                                <input type="date" className="border p-2 rounded text-sm w-40 font-bold" value={header.tanggal} onChange={e => setHeader({...header, tanggal: e.target.value})} />
                            </div>
                            <div><label className="block text-xs font-bold mb-1 uppercase">Line</label>
                                <input type="text" readOnly className="border p-2 rounded text-sm w-32 bg-gray-100 font-bold text-center" value={header.line} />
                            </div>
                            <button onClick={loadData} className="bg-blue-100 text-blue-700 p-2 rounded hover:bg-blue-200 transition"><IconDashboard /></button>
                        </div>
                        
                        <div className="flex flex-wrap gap-2">
                            <button onClick={() => setShowScanner(true)} className="bg-yellow-500 text-white px-4 py-2 rounded font-bold text-xs flex items-center gap-2 hover:bg-yellow-600 shadow-sm uppercase">Scan QR</button>
                            <button className="bg-green-600 text-white px-4 py-2 rounded font-bold text-xs flex items-center gap-2 hover:bg-green-700 shadow-sm uppercase">Tambah Manual</button>
                            <button className="bg-purple-600 text-white px-4 py-2 rounded font-bold text-xs flex items-center gap-2 hover:bg-purple-700 shadow-sm uppercase">Member</button>
                            <button onClick={() => window.print()} className="bg-gray-800 text-white px-4 py-2 rounded font-bold text-xs flex items-center gap-2 hover:bg-gray-900 shadow-sm uppercase">Print</button>
                        </div>
                    </div>

                    {/* Print Header (Gaya PR V1) */}
                    <div className="w-full flex justify-between items-end mb-4 border-b-2 border-black pb-2 px-2">
                        <div className="w-1/3 text-lg font-bold">
                            Tanggal : <span className="border-b border-black min-w-[150px] inline-block ml-2">{new Date(header.tanggal).toLocaleDateString('id-ID', {day:'2-digit', month:'long', year:'numeric'})}</span>
                        </div>
                        <div className="w-1/3 text-center">
                            <h1 className="text-3xl font-black tracking-widest uppercase">PRODUCTION REPORT</h1>
                        </div>
                        <div className="w-1/3 flex justify-end gap-4 font-bold">
                            <div className="border-2 border-black p-2 min-w-[80px] text-center">
                                <div className="text-[10px]">LINE</div><div>{header.line}</div>
                            </div>
                            <div className="border-2 border-black p-2 min-w-[80px] text-center flex items-center justify-center">
                                <span className="mr-2 text-[10px]">OT</span> <span className="border-b border-black w-10"></span>
                            </div>
                        </div>
                    </div>

                    {/* Main Excel Table */}
                    <div className="overflow-x-auto overflow-y-auto" style={{ maxHeight: '60vh' }}>
                        <table className="excel-table">
                            <thead>
                                <tr>
                                    <th rowSpan="2" className="sticky-col no-print">Aksi</th>
                                    <th rowSpan="2" className="w-10">NO</th>
                                    <th rowSpan="2" className="w-32">CC NO</th>
                                    <th rowSpan="2" className="w-32">Customer</th>
                                    <th rowSpan="2" className="w-24">Spec</th>
                                    <th rowSpan="2" className="w-32">MC/Semi Size</th>
                                    <th rowSpan="2" className="w-24">Actual Width</th>
                                    <th rowSpan="2" className="w-20">Weight</th>
                                    <th rowSpan="2" className="w-32">Product Size</th>
                                    <th rowSpan="2" className="w-16">Qty FG</th>
                                    <th rowSpan="2" className="w-16">Qty NG</th>
                                    <th rowSpan="2" className="w-20">Qty Total</th>
                                    <th rowSpan="2" className="w-24">Total Length</th>
                                    <th rowSpan="2" className="w-20">Coil Set</th>
                                    <th rowSpan="2" className="w-20">Start</th>
                                    <th rowSpan="2" className="w-20">End</th>
                                    <th rowSpan="2" className="w-24">Produk Keluar</th>
                                    <th colSpan="10" className="bg-blue-100 uppercase">Down Time (Minutes)</th>
                                    <th rowSpan="2" className="w-24">Line Speed</th>
                                    <th rowSpan="2" className="w-48">Remark</th>
                                </tr>
                                <tr>
                                    <th className="bg-blue-50">TBM</th><th className="bg-blue-50">Packing</th>
                                    <th className="bg-blue-50">Wait MC</th><th className="bg-blue-50">Wait Hagumi</th>
                                    <th className="bg-blue-50">Wait Crane</th><th className="bg-blue-50">Hagumi/Sep</th>
                                    <th className="bg-blue-50">Winder</th><th className="bg-blue-50">Cleaning</th>
                                    <th className="bg-blue-50">Machine Prob</th><th className="bg-blue-50">Other</th>
                                </tr>
                            </thead>
                            <tbody>
                                {rows.length === 0 ? (
                                    <tr><td colSpan="28" className="p-8 text-gray-400 italic">BELUM ADA DATA UNTUK TANGGAL INI</td></tr>
                                ) : rows.map((r, i) => (
                                    <tr key={i}>
                                        <td className="sticky-col no-print bg-white">
                                            <div className="flex gap-2 justify-center">
                                                <button className="text-blue-600">✎</button>
                                                <button className="text-red-600">🗑</button>
                                            </div>
                                        </td>
                                        <td>{i+1}</td>
                                        <td className="font-bold">{r.ccno}</td><td>{r.customer}</td><td>{r.spec}</td>
                                        <td>{r.mc_semi_prod_size}</td><td>{r.actual_width_mc}</td><td className="font-bold">{r.weight}</td>
                                        <td>{r.product_size}</td><td>{r.qty_fg}</td><td>{r.qty_ng}</td>
                                        <td className="font-bold bg-gray-100">{r.qty_total}</td><td>{r.total_length}</td>
                                        <td>{r.coil_set_lifter}</td><td>{r.start_process}</td><td>{r.end_process}</td>
                                        <td>{r.produk_keluar_mesin}</td>
                                        <td className="bg-blue-50/30">{r.dt_tbm}</td><td className="bg-blue-50/30">{r.dt_packing_coil_back}</td>
                                        <td className="bg-blue-50/30">{r.dt_waiting_mc}</td><td className="bg-blue-50/30">{r.dt_waiting_hagumi}</td>
                                        <td className="bg-blue-50/30">{r.dt_waiting_crane}</td><td className="bg-blue-50/30">{r.dt_hagumi_separator}</td>
                                        <td className="bg-blue-50/30">{r.dt_winder_top_end}</td><td className="bg-blue-50/30">{r.dt_cleaning_mesin}</td>
                                        <td className="bg-blue-50/30">{r.dt_machine_problem}</td><td className="bg-blue-50/30">{r.dt_other}</td>
                                        <td>{r.line_speed}</td><td className="text-left">{r.remark}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {/* Footer Area (Gaya PR V1) */}
                    <div className="mt-4 border border-black text-[10px] flex flex-wrap" style={{ pageBreakInside: 'avoid' }}>
                        <div className="w-1/4 border-r border-black p-2">
                            <div className="font-bold mb-1">Line Member</div>
                            <table className="w-full border-collapse border border-black text-center">
                                {[1, 2, 3, 4, 5].map(n => (
                                    <tr key={n}>
                                        <td className="border border-black w-6">{n}</td><td className="border border-black h-4"></td>
                                        <td className="border border-black w-6">{n+5}</td><td className="border border-black h-4"></td>
                                    </tr>
                                ))}
                            </table>
                        </div>
                        <div className="w-1/4 border-r border-black p-2 flex flex-col justify-end">
                            <div className="text-right font-bold mb-2 uppercase">Total Proses</div>
                            <table className="w-full border-collapse border border-black">
                                <tr><td className="border border-black p-1 bg-gray-50 uppercase">Coil / Skid</td><td className="border border-black p-1 text-center font-bold">{totals.coil}</td></tr>
                                <tr><td className="border border-black p-1 bg-gray-50 uppercase">Berat</td><td className="border border-black p-1 text-center font-bold">{totals.berat}</td></tr>
                            </table>
                        </div>
                        <div className="w-2/5 border-r border-black p-2 bg-pink-100/50">
                            <div className="font-bold mb-1 uppercase">Definisi • Rule</div>
                            <p>• Coil set: Memasukkan Coil ke Drum (Persiapan, Visual cek, Scan).</p>
                            <p>• Start Process: Setelah bagian top coil ditarik recoiler / Running Otomatis.</p>
                            <p>• End Process: Setelah produk terlepas dari drum / Potongan terakhir.</p>
                            <p>• Down Time: Wajib diisi setiap kolom jika terjadi loss time.</p>
                        </div>
                        <div className="flex-1 p-2 flex flex-col">
                            <div className="border border-black flex-1 flex flex-col">
                                <div className="text-center border-b border-black py-1 uppercase">Cek Leader</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // =====================================================================
        // KOMPONEN: MAIN LAYOUT (Sidebar & Navigation)
        // =====================================================================
        const App = () => {
            const [user, setUser] = useState({ name: 'LV1', role: 'Operator' });
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [activeMenu, setActiveMenu] = useState('menu1');

            const menus = [
                { id: 'menu1', title: 'Production Report', icon: <IconReport /> },
                { id: 'menu2', title: 'Dashboard Monitor', icon: <IconDashboard /> },
                { id: 'menu3', title: 'Upload Planning', icon: <IconUpload /> },
                { id: 'menu4', title: 'OEE Analysis', icon: <IconAnalyze /> },
                { id: 'menu5', title: 'Print NG Report', icon: <IconPrint /> },
            ];

            return (
                <div className="flex h-screen bg-[#f4f6f9] overflow-hidden">
                    {/* SIDEBAR */}
                    <div className={`bg-[#2c323a] text-[#aab3bc] transition-all duration-300 flex flex-col shadow-xl z-20 ${isSidebarOpen ? 'w-64' : 'w-20'}`}>
                        <div className="h-[60px] bg-[#22272e] flex items-center justify-center border-b border-[#1e2228]">
                            {isSidebarOpen ? <span className="font-bold text-xl text-white tracking-widest uppercase">HSSI <span className="text-blue-500">SYSTEM</span></span> : <span className="text-blue-500 font-bold">HS</span>}
                        </div>
                        <div className="flex-1 overflow-y-auto py-6">
                            <ul className="space-y-1">
                                {menus.map((menu) => (
                                    <li key={menu.id}>
                                        <button onClick={() => setActiveMenu(menu.id)}
                                            className={`w-full flex items-center py-3 transition-all border-l-4 ${activeMenu === menu.id ? 'bg-[#252a31] border-blue-500 text-white' : 'border-transparent hover:bg-[#252a31] hover:text-white'} ${isSidebarOpen ? 'px-5' : 'justify-center'}`}
                                            title={!isSidebarOpen ? menu.title : ""}
                                        >
                                            <span className={`${activeMenu === menu.id ? 'text-blue-500' : ''}`}>{menu.icon}</span>
                                            {isSidebarOpen && <span className="ml-4 text-sm font-medium tracking-wide">{menu.title}</span>}
                                        </button>
                                    </li>
                                ))}
                            </ul>
                        </div>
                        <div className="p-4 bg-[#22272e] text-[10px] text-center font-bold uppercase tracking-widest text-gray-500">v2.5 Final Architecture</div>
                    </div>

                    {/* CONTENT AREA */}
                    <div className="flex-1 flex flex-col overflow-hidden relative">
                        <header className="h-[60px] bg-[#a84444] shadow-md flex items-center px-4 z-10 gap-4 no-print">
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="text-white p-2 hover:bg-[#913b3b] rounded transition-colors"><IconMenu /></button>
                            <h1 className="text-lg font-bold text-white uppercase tracking-wider">{menus.find(m => m.id === activeMenu)?.title}</h1>
                        </header>

                        <main className="flex-1 overflow-auto p-4 sm:p-6 bg-[#f4f6f9]">
                            {activeMenu === 'menu1' ? <ProductionReportModule user={user} /> : 
                             <div className="p-20 text-center bg-white rounded shadow-lg border-t-4 border-blue-600">
                                 <h2 className="text-3xl font-black text-gray-300 uppercase italic tracking-tighter">Module Under Development</h2>
                             </div>}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
