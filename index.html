<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Report - PT. HSSI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.7); backdrop-filter: blur(4px); }
        .member-input { width: 100%; border: 1px solid #d1d5db; padding: 4px; font-size: 10px; border-radius: 4px; text-transform: uppercase; text-align: center; font-weight: bold;}
        .member-input:focus { outline: 2px solid #3b82f6; border-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- KUMPULAN IKON SVG ---
        const IconDashboard = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>;
        const IconReport = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>;
        const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
        const IconAnalyze = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/><path d="M12 2v2"/><path d="M12 22v-2"/><path d="m17 20.66-1-1.73"/><path d="M11 10.27 7 3.34"/><path d="m20.66 17-1.73-1"/><path d="m3.34 7 1.73 1"/><path d="M14 12h8"/><path d="M2 12h2"/><path d="m20.66 7-1.73 1"/><path d="m3.34 17 1.73-1"/><path d="m17 3.34-1 1.73"/><path d="m11 13.73-4 6.93"/></svg>;
        const IconPrint = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>;
        const PlusIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const XIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const IconChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;

        // =====================================================================
        // KOMPONEN 1: MODUL PRODUCTION REPORT
        // =====================================================================
        const ProductionReportModule = () => {
            // ---> GANTI URL DI BAWAH INI DENGAN URL GAS ANDA <---
            const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzh-4ByxkDMIwzg7EFYp6X21UIFSaD2vePeKwv-koxNV2vS9GXkjmo_Y_RlVL2I0dF4/exec"; 

            const lineOptions = ["LV1", "LM1", "LM2", "LM3", "SL1", "SL2", "SL3", "MS1", "MS2", "EMBOSS", "DS1", "DS2", "DS3", "REWORK", "REPACK"];

            const [isLoading, setIsLoading] = useState(false);
            const [status, setStatus] = useState({ type: '', message: '' });
            const [showScanner, setShowScanner] = useState(false);
            const [showFormModal, setShowFormModal] = useState(false);
            const [rows, setRows] = useState([]);
            const [currentEntry, setCurrentEntry] = useState(null);
            const scannerRef = useRef(null);

            const [header, setHeader] = useState({
                tanggal: new Date().toISOString().split('T')[0],
                line: lineOptions[0],
                leader: '',
                ot: ''
            });

            const [members, setMembers] = useState(Array(10).fill(''));

            useEffect(() => {
                if (showScanner) {
                    const html5QrCode = new Html5Qrcode("reader");
                    scannerRef.current = html5QrCode;
                    html5QrCode.start(
                        { facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } },
                        (decodedText) => handleScanSuccess(decodedText),
                        (err) => {}
                    ).catch(err => console.error(err));
                    return () => { if (scannerRef.current) scannerRef.current.stop().catch(e => console.error(e)); };
                }
            }, [showScanner]);

            const handleScanSuccess = (text) => {
                const parts = text.split(',');
                const newEntry = {
                    ccno: parts[0]?.trim() || '', spec: parts[1]?.trim() || '', mc_semi: parts[2]?.trim() || '', weight: parts[5]?.trim() || '',
                    customer: '', actual_width: '', product_size: '', qty_fg: '', qty_ng: '', cut: '', total_length: '', coil_set: '', start_proc: '', end_proc: '', prod_keluar: '', tbm: '', packing_back: '', waiting_mc: '', waiting_hagumi: '', waiting_crane: '', hagumi_separator: '', winder: '', cleaning: '', machine_prob: '', other: '', line_speed: '', remark: ''
                };
                setCurrentEntry(newEntry);
                setShowScanner(false);
                setShowFormModal(true);
            };

            const handleMemberChange = (index, value) => {
                const newMembers = [...members];
                newMembers[index] = value;
                setMembers(newMembers);
            };

            const handleSaveSingleRowToDB = async () => {
                setIsLoading(true);
                const newNo = rows.length > 0 ? Math.max(...rows.map(r => parseInt(r.no) || 0)) + 1 : 1;
                const finalEntry = { ...currentEntry, no: newNo };
                
                const validMembers = members.filter(m => m.trim() !== "");
                const payload = { header: header, members: validMembers, rows: [finalEntry] };

                try {
                    await fetch(WEB_APP_URL, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    const newId = rows.length > 0 ? Math.max(...rows.map(r => r.id || 0)) + 1 : 1;
                    setRows([...rows, { ...finalEntry, id: newId }]);
                    setStatus({ type: 'success', message: 'Data Berhasil Disimpan ke Database!' });
                    setShowFormModal(false);
                    setCurrentEntry(null);
                } catch (error) {
                    setStatus({ type: 'error', message: 'Gagal mengirim data.' });
                } finally {
                    setIsLoading(false);
                    setTimeout(() => setStatus({ type: '', message: '' }), 4000);
                }
            };

            return (
                <div className="bg-white rounded-lg shadow border border-gray-200 flex flex-col relative h-full">
                    
                    {/* MODAL SCANNER */}
                    {showScanner && (
                        <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="p-4 border-b flex justify-between items-center bg-gray-50">
                                    <h2 className="text-lg font-bold text-black">Scan QR Label</h2>
                                    <button onClick={() => setShowScanner(false)} className="text-gray-500 hover:text-black"><XIcon /></button>
                                </div>
                                <div id="reader" className="w-full aspect-square bg-black"></div>
                            </div>
                        </div>
                    )}

                    {/* MODAL FORM INPUT */}
                    {showFormModal && currentEntry && (
                        <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4 overflow-y-auto">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-4xl border border-blue-200 mt-10 mb-10 text-xs">
                                <div className="p-3 border-b flex justify-between items-center bg-blue-600 text-white sticky top-0 z-10">
                                    <h2 className="font-bold uppercase">Lengkapi Data Produksi</h2>
                                    <button onClick={() => setShowFormModal(false)}><XIcon /></button>
                                </div>
                                <div className="p-4 grid grid-cols-4 gap-3 text-black">
                                    <div className="col-span-4 text-blue-700 font-bold uppercase border-b border-blue-200 pb-1">Data QR (Otomatis)</div>
                                    <div><label className="font-bold block">CCNO</label><input className="w-full border p-1.5 rounded bg-gray-50 font-bold text-blue-900" readOnly value={currentEntry.ccno} /></div>
                                    <div><label className="font-bold block">Spec</label><input className="w-full border p-1.5 rounded bg-gray-50 font-bold" readOnly value={currentEntry.spec} /></div>
                                    <div><label className="font-bold block">MC/Semi</label><input className="w-full border p-1.5 rounded bg-gray-50 font-bold" readOnly value={currentEntry.mc_semi} /></div>
                                    <div><label className="font-bold block">Weight</label><input className="w-full border p-1.5 rounded bg-gray-50 font-bold" readOnly value={currentEntry.weight} /></div>
                                    
                                    <div className="col-span-4 text-gray-600 font-bold uppercase border-b border-gray-200 pb-1 mt-2">Input Produksi</div>
                                    <div><label className="font-bold block">Qty FG</label><input type="number" className="w-full border p-1.5 rounded border-gray-300" value={currentEntry.qty_fg} onChange={e => setCurrentEntry({...currentEntry, qty_fg: e.target.value})} /></div>
                                    <div><label className="font-bold block">Qty NG</label><input type="number" className="w-full border p-1.5 rounded border-gray-300" value={currentEntry.qty_ng} onChange={e => setCurrentEntry({...currentEntry, qty_ng: e.target.value})} /></div>
                                    <div><label className="font-bold block">Start Proc</label><input type="time" className="w-full border p-1.5 rounded border-gray-300" value={currentEntry.start_proc} onChange={e => setCurrentEntry({...currentEntry, start_proc: e.target.value})} /></div>
                                    <div><label className="font-bold block">End Proc</label><input type="time" className="w-full border p-1.5 rounded border-gray-300" value={currentEntry.end_proc} onChange={e => setCurrentEntry({...currentEntry, end_proc: e.target.value})} /></div>
                                    
                                    <div className="col-span-4 text-gray-600 font-bold uppercase border-b border-gray-200 pb-1 mt-2">Downtime (Menit)</div>
                                    <div><label className="font-bold block">TBM</label><input type="number" className="w-full border p-1.5 rounded border-gray-300" value={currentEntry.tbm} onChange={e => setCurrentEntry({...currentEntry, tbm: e.target.value})} /></div>
                                    <div><label className="font-bold block">Machine Prob</label><input type="number" className="w-full border p-1.5 rounded border-gray-300" value={currentEntry.machine_prob} onChange={e => setCurrentEntry({...currentEntry, machine_prob: e.target.value})} /></div>
                                    <div><label className="font-bold block">Cleaning</label><input type="number" className="w-full border p-1.5 rounded border-gray-300" value={currentEntry.cleaning} onChange={e => setCurrentEntry({...currentEntry, cleaning: e.target.value})} /></div>
                                    <div><label className="font-bold block">Remark</label><input type="text" className="w-full border p-1.5 rounded border-gray-300" value={currentEntry.remark} onChange={e => setCurrentEntry({...currentEntry, remark: e.target.value})} /></div>

                                    <div className="col-span-4 border-t pt-3 mt-2 flex justify-end gap-2">
                                        <button onClick={() => setShowFormModal(false)} className="px-4 py-2 border rounded font-bold text-gray-600 bg-gray-100 hover:bg-gray-200">BATAL</button>
                                        <button onClick={handleSaveSingleRowToDB} disabled={isLoading} className="px-6 py-2 bg-green-600 text-white rounded font-bold shadow hover:bg-green-700 flex items-center gap-2">
                                            {isLoading ? 'MENYIMPAN...' : 'SIMPAN KE DATABASE'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* STATUS NOTIF */}
                    {status.message && (
                        <div className={`absolute top-4 left-1/2 transform -translate-x-1/2 z-[150] px-6 py-2 rounded shadow-lg text-white font-bold text-xs ${status.type === 'success' ? 'bg-green-600' : 'bg-red-600'}`}>
                            {status.message}
                        </div>
                    )}

                    {/* --- HEADER BIRU --- */}
                    <div className="bg-[#1e3a8a] text-white p-4 rounded-t-lg border-b-4 border-blue-400">
                        <h2 className="text-xl font-black italic tracking-wider">HSSI - PRODUCTION REPORT <span className="text-xs font-normal not-italic opacity-75">v2.1</span></h2>
                        <p className="text-xs text-blue-200 uppercase font-bold mt-1">Sistem Pencatatan Data Produksi</p>
                    </div>

                    {/* --- AREA CONTROL PANEL --- */}
                    <div className="bg-gray-100 p-3 border-b flex flex-col xl:flex-row gap-4 xl:justify-between items-start xl:items-center">
                        {/* Kiri: Info Line */}
                        <div className="flex flex-wrap gap-2">
                            <div className="flex items-center gap-2 border border-gray-300 px-2 py-1 rounded bg-white shadow-sm">
                                <span className="font-bold text-[10px] text-gray-500">TGL</span>
                                <input type="date" className="border-none bg-transparent text-xs font-bold focus:ring-0 p-0" value={header.tanggal} onChange={(e) => setHeader({...header, tanggal: e.target.value})} />
                            </div>
                            <div className="flex items-center gap-2 border border-gray-300 px-2 py-1 rounded bg-white shadow-sm">
                                <span className="font-bold text-[10px] text-gray-500">LINE</span>
                                <select className="border-none bg-transparent text-xs font-bold focus:ring-0 p-0 cursor-pointer" value={header.line} onChange={(e) => setHeader({...header, line: e.target.value})}>
                                    {lineOptions.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                                </select>
                            </div>
                            <div className="flex items-center gap-2 border border-gray-300 px-2 py-1 rounded bg-white shadow-sm">
                                <span className="font-bold text-[10px] text-gray-500">LEADER</span>
                                <input type="text" className="w-20 border-none bg-transparent text-xs font-bold focus:ring-0 p-0 uppercase" placeholder="..." value={header.leader} onChange={(e) => setHeader({...header, leader: e.target.value})} />
                            </div>
                            <div className="flex items-center gap-2 border border-gray-300 px-2 py-1 rounded bg-white shadow-sm">
                                <span className="font-bold text-[10px] text-gray-500">OT</span>
                                <input type="text" className="w-10 border-none bg-transparent text-xs font-bold focus:ring-0 p-0 uppercase" placeholder="..." value={header.ot} onChange={(e) => setHeader({...header, ot: e.target.value})} />
                            </div>
                        </div>

                        {/* Kanan: Input Members Horizontal */}
                        <div className="bg-white p-2 border border-gray-300 rounded shadow-sm">
                            <div className="text-[9px] font-bold text-gray-500 mb-1 uppercase tracking-wide">Input Line Members</div>
                            <div className="grid grid-cols-5 md:grid-cols-10 gap-1">
                                {members.map((member, index) => (
                                    <input 
                                        key={index}
                                        type="text" 
                                        className="member-input w-14" 
                                        placeholder={`M${index + 1}`} 
                                        value={member} 
                                        onChange={(e) => handleMemberChange(index, e.target.value)} 
                                    />
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* --- AREA TABEL --- */}
                    <div className="flex-1 overflow-auto bg-white">
                        <table className="w-full border-collapse table-fixed min-w-[900px] text-[10px] text-black">
                            <thead className="sticky top-0 bg-[#2c323a] text-white z-10 text-center uppercase font-bold text-[11px]">
                                <tr>
                                    <th className="border border-gray-500 p-2 w-10">NO</th>
                                    <th className="border border-gray-500 p-2 w-32">CCNO</th>
                                    <th className="border border-gray-500 p-2 w-24">SPEC</th>
                                    <th className="border border-gray-500 p-2 w-20">WEIGHT</th>
                                    <th className="border border-gray-500 p-2 w-16">QTY FG</th>
                                    <th className="border border-gray-500 p-2 w-16">START</th>
                                    <th className="border border-gray-500 p-2 w-16">END</th>
                                    <th className="border border-gray-500 p-2 w-32">REMARK</th>
                                </tr>
                            </thead>
                            <tbody>
                                {rows.length === 0 && (
                                    <tr><td colSpan="8" className="h-24 text-center text-gray-400 italic font-medium bg-gray-50">Belum ada data scan di sesi ini.</td></tr>
                                )}
                                {rows.map((row, idx) => (
                                    <tr key={idx} className="hover:bg-blue-50 text-center h-8 border-b">
                                        <td className="border-r border-l border-gray-300 font-bold bg-gray-50">{row.no}</td>
                                        <td className="border-r border-gray-300 text-blue-700 font-bold">{row.ccno}</td>
                                        <td className="border-r border-gray-300">{row.spec}</td>
                                        <td className="border-r border-gray-300">{row.weight}</td>
                                        <td className="border-r border-gray-300 font-bold">{row.qty_fg}</td>
                                        <td className="border-r border-gray-300 text-green-700">{row.start_proc}</td>
                                        <td className="border-r border-gray-300 text-red-700">{row.end_proc}</td>
                                        <td className="border-r border-gray-300 text-left px-2 truncate" title={row.remark}>{row.remark}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {/* --- AREA BANTUAN --- */}
                    <div className="bg-yellow-50 border border-yellow-200 p-3 text-xs text-yellow-800 m-2 rounded shadow-sm">
                        <strong className="font-bold flex items-center gap-1 mb-1">💡 Cara Penggunaan:</strong>
                        <ol className="list-decimal ml-5 leading-tight space-y-0.5">
                            <li>Isi parameter Tanggal, Line, Leader, dan Anggota.</li>
                            <li>Klik tombol Scan QR biru yang mengambang di pojok kanan bawah.</li>
                            <li>Lengkapi data produksi pada jendela pop-up.</li>
                            <li>Klik Simpan, data akan tersimpan ke database Google Sheets secara otomatis.</li>
                        </ol>
                    </div>

                    {/* --- FLOATING ACTION BUTTON --- */}
                    <div className="absolute bottom-6 right-6 flex flex-col gap-3">
                        <button onClick={() => setShowScanner(true)} className="bg-blue-600 text-white p-4 rounded-full shadow-2xl hover:bg-blue-700 hover:scale-105 active:scale-95 transition-all group flex items-center justify-center gap-2 z-50">
                            <PlusIcon />
                            <span className="hidden group-hover:inline pr-2 font-bold text-sm tracking-wide">SCAN QR</span>
                        </button>
                    </div>
                </div>
            );
        };

        // =====================================================================
        // KOMPONEN 2: LAYOUT UTAMA (Sidebar)
        // =====================================================================
        const App = () => {
            const [activeMenu, setActiveMenu] = React.useState('menu1');
            const [isSidebarOpen, setIsSidebarOpen] = React.useState(true);

            // Perbaikan 1: Mengembalikan semua 5 Menu
            const menus = [
                { id: 'menu1', title: 'Production Report', icon: <IconReport /> },
                { id: 'menu2', title: 'Dashboard Monitor', icon: <IconDashboard /> },
                { id: 'menu3', title: 'Upload Planning', icon: <IconUpload /> },
                { id: 'menu4', title: 'OEE Analysis', icon: <IconAnalyze /> },
                { id: 'menu5', title: 'Print NG Report', icon: <IconPrint /> },
            ];

            return (
                <div className="flex h-screen bg-[#f4f6f9] overflow-hidden font-sans">
                    {/* SIDEBAR */}
                    <div className={`bg-[#2c323a] text-[#aab3bc] transition-all duration-300 flex flex-col z-20 ${isSidebarOpen ? 'w-64' : 'w-20'}`}>
                        <div className="h-[60px] bg-[#22272e] flex items-center justify-center border-b border-[#1e2228]">
                            {isSidebarOpen ? (
                                <span className="font-bold text-xl tracking-wider text-white">HSSI <span className="text-blue-500">SYSTEM</span></span>
                            ) : (
                                <span className="font-bold text-xl text-blue-500">HS</span>
                            )}
                        </div>

                        {/* Profile Area */}
                        <div className={`p-4 border-b border-[#3b424d] flex items-center gap-3 ${!isSidebarOpen && 'justify-center'}`}>
                            <div className="w-10 h-10 rounded-full bg-red-600 text-white flex items-center justify-center font-bold shadow-md">SO</div>
                            {isSidebarOpen && (
                                <div className="flex flex-col">
                                    <span className="text-white font-bold text-sm tracking-wide">SOPARI</span>
                                    <div className="flex items-center gap-1 mt-0.5">
                                        <div className="w-2 h-2 bg-green-500 rounded-full"></div>
                                        <span className="text-xs text-gray-400">Online</span>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Navigasi */}
                        <div className="flex-1 overflow-y-auto py-4">
                            <ul className="space-y-1">
                                {menus.map((menu) => (
                                    <li key={menu.id}>
                                        <button 
                                            onClick={() => setActiveMenu(menu.id)}
                                            className={`w-full flex items-center justify-between py-3 transition-all border-l-[3px] 
                                                ${activeMenu === menu.id ? 'bg-[#252a31] border-blue-500 text-white' : 'border-transparent hover:bg-[#252a31]'}
                                                ${isSidebarOpen ? 'px-5' : 'px-0 justify-center'}
                                            `}
                                            title={!isSidebarOpen ? menu.title : ""}
                                        >
                                            <div className="flex items-center gap-3">
                                                <span className={`${activeMenu === menu.id ? 'text-blue-500' : 'text-[#8a95a5]'}`}>{menu.icon}</span>
                                                {isSidebarOpen && <span className="text-[13px] font-medium tracking-wide">{menu.title}</span>}
                                            </div>
                                            {isSidebarOpen && <span className="text-[#647180]"><IconChevronLeft /></span>}
                                        </button>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>

                    {/* MAIN CONTENT AREA */}
                    <div className="flex-1 flex flex-col overflow-hidden relative">
                        <header className="h-[60px] bg-[#a84444] shadow-md flex items-center justify-between px-4 z-10">
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="text-white p-1 hover:bg-[#913b3b] rounded"><IconMenu /></button>
                            <h1 className="text-lg font-semibold text-white tracking-wide">{menus.find(m => m.id === activeMenu)?.title}</h1>
                        </header>

                        <main className="flex-1 overflow-x-hidden overflow-y-auto bg-[#f4f6f9] p-4 sm:p-6">
                            {activeMenu === 'menu1' ? <ProductionReportModule /> : 
                             <div className="p-6 bg-[#1a1d21] text-white rounded border-t-2 border-green-500 text-center shadow-lg">
                                 <h2 className="text-green-400 font-bold text-xl mb-2 uppercase">{menus.find(m => m.id === activeMenu)?.title}</h2>
                                 <p className="text-gray-400">Modul ini dalam tahap pengembangan...</p>
                             </div>}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
