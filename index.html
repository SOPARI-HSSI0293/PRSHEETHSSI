<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Report - PT. HSSI</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- KUMPULAN IKON SVG MODERN ---
        const IconDashboard = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>;
        const IconReport = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><line x1="10" x2="8" y1="9" y2="9"/></svg>;
        const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
        const IconAnalyze = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 20a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z"/><path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4Z"/><path d="M12 2v2"/><path d="M12 22v-2"/><path d="m17 20.66-1-1.73"/><path d="M11 10.27 7 3.34"/><path d="m20.66 17-1.73-1"/><path d="m3.34 7 1.73 1"/><path d="M14 12h8"/><path d="M2 12h2"/><path d="m20.66 7-1.73 1"/><path d="m3.34 17 1.73-1"/><path d="m17 3.34-1 1.73"/><path d="m11 13.73-4 6.93"/></svg>;
        const IconPrint = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect width="12" height="8" x="6" y="14"/></svg>;
        const IconMenu = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>;
        const IconChevronLeft = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;

        const App = () => {
            const [activeMenu, setActiveMenu] = React.useState('menu1');
            const [isSidebarOpen, setIsSidebarOpen] = React.useState(true);

            const menus = [
                { id: 'menu2', title: 'Dashboard', icon: <IconDashboard /> },
                { id: 'menu1', title: 'Production Report', icon: <IconReport /> },
                { id: 'menu3', title: 'Upload Planning', icon: <IconUpload /> },
                { id: 'menu4', title: 'OEE Analysis', icon: <IconAnalyze /> },
                { id: 'menu5', title: 'Print NG Report', icon: <IconPrint /> },
            ];

            const renderContent = () => {
                switch(activeMenu) {
                    case 'menu1':
                        return (
                            <div className="p-6 bg-white rounded shadow-sm border-t-2 border-blue-600">
                                <h2 className="text-xl font-bold mb-4 text-gray-700">Production Report Module</h2>
                                <p className="text-gray-500 text-sm">Ruang ini akan kita isi dengan kode Scanner QR dari file index (1).html Anda.</p>
                            </div>
                        );
                    case 'menu2':
                        return (
                            <div className="p-6 bg-[#1a1d21] text-white rounded shadow-sm border-t-2 border-green-500">
                                <h2 className="text-xl font-bold mb-4 text-green-400">DASHBOARD MONITOR</h2>
                                <p className="text-gray-400 text-sm">Grafik pencapaian target (Dark Mode) akan dimuat di sini.</p>
                            </div>
                        );
                    default:
                        return (
                            <div className="p-6 bg-white rounded shadow-sm">
                                <h2 className="text-lg font-bold text-gray-500">Modul sedang dalam pengembangan...</h2>
                            </div>
                        );
                }
            };

            return (
                <div className="flex h-screen bg-[#f4f6f9] overflow-hidden font-sans">
                    {/* SIDEBAR (Dark Theme ala HRMS/ERP) */}
                    <div className={`bg-[#2c323a] text-[#aab3bc] transition-all duration-300 flex flex-col z-20 ${isSidebarOpen ? 'w-64' : 'w-20'}`}>
                        
                        {/* Logo / Title Area (Menyatu dengan Topbar kiri) */}
                        <div className="h-[60px] bg-[#22272e] flex items-center justify-center border-b border-[#1e2228]">
                            {isSidebarOpen ? (
                                <span className="font-bold text-xl tracking-wider text-white">
                                    HSSI <span className="text-blue-500">SYSTEM</span>
                                </span>
                            ) : (
                                <span className="font-bold text-xl text-blue-500">HS</span>
                            )}
                        </div>

                        {/* Profile Area */}
                        <div className={`p-4 border-b border-[#3b424d] flex items-center gap-3 ${!isSidebarOpen && 'justify-center'}`}>
                            <div className="w-10 h-10 rounded-full bg-red-600 text-white flex items-center justify-center font-bold flex-shrink-0 shadow-md">
                                SO
                            </div>
                            {isSidebarOpen && (
                                <div className="flex flex-col">
                                    <span className="text-white font-bold text-sm tracking-wide">SOPARI</span>
                                    <div className="flex items-center gap-1.5 mt-0.5">
                                        <div className="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                        <span className="text-xs text-gray-400">Online</span>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Navigation Label */}
                        {isSidebarOpen && (
                            <div className="px-5 py-3 text-[10px] font-bold text-[#647180] uppercase tracking-widest mt-2">
                                Navigation
                            </div>
                        )}

                        {/* Navigasi Menu */}
                        <div className="flex-1 overflow-y-auto pb-6">
                            <ul className="space-y-1">
                                {menus.map((menu) => (
                                    <li key={menu.id}>
                                        <button 
                                            onClick={() => setActiveMenu(menu.id)}
                                            className={`w-full flex items-center justify-between py-3 transition-all duration-200 border-l-[3px] 
                                                ${activeMenu === menu.id 
                                                    ? 'bg-[#252a31] border-blue-500 text-white' 
                                                    : 'border-transparent hover:bg-[#252a31] hover:text-gray-200'}
                                                ${isSidebarOpen ? 'px-5' : 'px-0 justify-center'}
                                            `}
                                            title={!isSidebarOpen ? menu.title : ""}
                                        >
                                            <div className="flex items-center gap-3">
                                                <span className={`${activeMenu === menu.id ? 'text-blue-500' : 'text-[#8a95a5]'}`}>
                                                    {menu.icon}
                                                </span>
                                                {isSidebarOpen && <span className="text-[13px] font-medium tracking-wide">{menu.title}</span>}
                                            </div>
                                            {isSidebarOpen && <span className="text-[#647180]"><IconChevronLeft /></span>}
                                        </button>
                                    </li>
                                ))}
                            </ul>
                        </div>
                    </div>

                    {/* MAIN CONTENT AREA */}
                    <div className="flex-1 flex flex-col overflow-hidden relative">
                        {/* Topbar / Header (Warna Marun) */}
                        <header className="h-[60px] bg-[#a84444] shadow-md flex items-center justify-between px-4 z-10">
                            <div className="flex items-center gap-4">
                                <button 
                                    onClick={() => setIsSidebarOpen(!isSidebarOpen)} 
                                    className="text-white p-1 hover:bg-[#913b3b] rounded transition-colors"
                                >
                                    <IconMenu />
                                </button>
                                <h1 className="text-lg font-semibold text-white tracking-wide hidden sm:block">
                                    {menus.find(m => m.id === activeMenu)?.title}
                                </h1>
                            </div>
                            
                            {/* Topbar Right Side Elements (Opsional) */}
                            <div className="flex items-center gap-3 text-white">
                                <span className="text-xs bg-[#913b3b] px-3 py-1 rounded-full border border-[#b54a4a] hidden sm:block">
                                    Server Time: {new Date().toLocaleDateString('id-ID')}
                                </span>
                            </div>
                        </header>

                        {/* Dynamic Page Content */}
                        <main className="flex-1 overflow-x-hidden overflow-y-auto bg-[#f4f6f9] p-6 sm:p-8">
                            {renderContent()}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
